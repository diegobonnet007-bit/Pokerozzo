  const s = G.state;
  const h = s.hand;
  const m = me();
  const bl = s.config.blindLevels[s.currentLevel];
  const prog = blindProgress(s);
  const pot = h ? Object.values(h.contributions).reduce((a, b) => a + b, 0) : 0;

  const active = s.seats.filter((x) => !x.eliminated || (h && h.inHand.includes(x.id)));
  const n = Math.max(active.length, 2);

  // Il giocatore locale sempre in basso: ruota il cerchio di conseguenza.
  const myIdx = active.findIndex((x) => x.id === G.seatId);
  const rot = myIdx >= 0 ? myIdx : 0;

  // Distanza minima fra posti, misurata: la distribuzione uniforme e' gia'
  // ottimale sugli angoli. Il margine sta nel raggio verticale: portando
  // l'ellisse da 47x41 a 47x47 la distanza a 8 giocatori sale da 32% a 36%.
  const seatsHtml = active.map((p, i) => {
    const pos = (i - rot + n) % n;
    const angle = (pos / n) * 2 * Math.PI + Math.PI / 2;
    const x = 50 + 47 * Math.cos(angle);
    const y = 50 + 47 * Math.sin(angle);

    const folded = h && h.folded.includes(p.id);
    const allin = h && h.allIn.includes(p.id);
    const acting = h && h.actingSeatId === p.id && s.phase === 'HAND';
    const bet = h ? (h.streetContributions[p.id] || 0) : 0;

    let badge = '';
    if (h) {
      if (p.id === h.buttonSeatId) badge = '<div class="pos-badge">D</div>';
      else if (p.id === h.sbSeatId) badge = '<div class="pos-badge sb">SB</div>';
      else if (p.id === h.bbSeatId) badge = '<div class="pos-badge bb">BB</div>';
    }

    let tag = '';
    if (p.eliminated) tag = '<span class="tag-mini tag-out">Fuori</span>';
    else if (allin) tag = '<span class="tag-mini tag-allin">All-in</span>';
    else if (!p.connected) tag = '<span class="tag-mini tag-off">Offline</span>';

    // Anello del timer attorno a chi sta giocando.
    let ring = '';
    if (acting && h.deadline && s.config.actionTimeoutSec > 0) {
      ring = `<svg class="timer-ring" data-deadline="${h.deadline}" data-total="${s.config.actionTimeoutSec * 1000}" viewBox="0 0 62 62">
        <circle class="bg" cx="31" cy="31" r="29"></circle>
        <circle class="fg" cx="31" cy="31" r="29" stroke-dasharray="182" stroke-dashoffset="0"></circle>
      </svg>`;
    }

    // La puntata va spinta VERSO IL CENTRO del tavolo, come le fiches vere.
    const towardCentre = y > 52 ? 'bet-up' : 'bet-down';
    return `<div class="seat ${folded ? 'folded' : ''} ${p.eliminated ? 'eliminated' : ''}" style="left:${x}%;top:${y}%">
      ${bet > 0 ? `<div class="seat-bet ${towardCentre} num">${fmt(bet)}</div>` : ''}
      <div class="avatar ${p.id === G.seatId ? 'me' : ''} ${acting ? 'acting' : ''} ${allin ? 'allin' : ''} ${p.connected ? '' : 'off'}">
        ${esc(p.name.slice(0, 2).toUpperCase())}
        ${badge}${ring}
      </div>
      <div class="seat-name">${esc(p.name)}</div>
      <div class="seat-chips num">${fmt(p.chips)}</div>
      ${tag}
    </div>`;
  }).join('');

  // Piatto: mostra i side pot separatamente quando esistono.
  let potSide = '';
  if (h && h.pots && h.pots.length > 1) {
    potSide = h.pots.map((p) => `${p.label}: ${fmt(p.amount)}`).join(' · ');
  }

  return `
  <div class="table-wrap">
    <div class="topbar">
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
        <span class="chip-badge">Bui ${bl.sb}/${bl.bb}</span>
        ${prog ? `<span class="chip-badge" style="background:rgba(242,237,227,.06);border-color:rgba(242,237,227,.15);color:var(--bone-dim)">${prog.done}/${prog.total} giri</span>` : ''}
        <span class="chip-badge" style="background:rgba(242,237,227,.06);border-color:rgba(242,237,227,.15);color:var(--bone-dim)">Mano ${s.handNumber}</span>
      </div>
      <div style="display:flex;gap:7px">
        <button class="icon-btn" data-a="sheet-standings" aria-label="Classifica">🏆</button>
        <button class="icon-btn" data-a="sheet-history" aria-label="Storico">≡</button>
        ${isGM() ? '<button class="icon-btn" data-a="sheet-gm" aria-label="Comandi Game Master" style="background:rgba(255,182,39,.14);border-color:rgba(255,182,39,.35);color:var(--brass)">⚙</button>' : ''}
      </div>
    </div>

    <div class="felt">
      <div class="pot-core">
        <div class="pot-label">Piatto</div>
        <div class="pot-value num">${fmt(pot)}</div>
        ${pot > 0 ? `<div class="pot-euro num">${potInEuro(pot)}</div>` : ''}
        ${potSide ? `<div class="pot-side num">${esc(potSide)}</div>` : ''}
        ${h ? `<div class="street-tag">${STREET_IT[h.street] || ''}</div>` : ''}
        ${h ? boardCards(h.street) : ''}
      </div>
      ${seatsHtml}
    </div>

    ${renderActionBar()}
  </div>`;
}

function renderActionBar() {
  const s = G.state;
  const m = me();

  if (s.phase === 'AWAITING_PAYOUT') {
    return `<div class="actionbar">
      ${isGM()
        ? '<button class="btn btn-primary" data-a="sheet-award">Assegna il piatto</button>'
        : '<p class="waiting-note">Il Game Master sta assegnando il piatto</p>'}
    </div>`;
  }

  if (s.phase === 'LOBBY') {
    return `<div class="actionbar">
      ${isGM()
        ? '<button class="btn btn-primary" data-a="start">Mano successiva</button>'
        : '<p class="waiting-note">In attesa della mano successiva</p>'}
    </div>`;
  }

  if (!m || m.eliminated) {
    return `<div class="actionbar"><p class="waiting-note">Sei fuori dal gioco. Guarda come finisce.</p></div>`;
  }

  // Tre cifre, non una: quanto ho, quanto ho gia' messo, quanto manca.
  // Sono le tre che servono per decidere, e vanno lette insieme.
  const myBet = s.hand ? (s.hand.streetContributions[G.seatId] || 0) : 0;
  const toCall = (() => {
    const c = myLegal().find((a) => a.action === 'CALL');
    return c ? c.amount : 0;
  })();
  const myStrip = `<div class="my-strip">
    <div class="ms-cell">
      <div class="lbl">Le tue fiches</div>
      <div class="val num">${fmt(m.chips)}</div>
    </div>
    ${myBet > 0 ? `<div class="ms-cell ms-bet">
      <div class="lbl">Hai puntato</div>
      <div class="val num">${fmt(myBet)}</div>
    </div>` : ''}
    ${toCall > 0 ? `<div class="ms-cell ms-call">
      <div class="lbl">Per vedere</div>
      <div class="val num">${fmt(toCall)}</div>
    </div>` : ''}
  </div>`;

  if (!isMyTurn()) {
    const h = s.hand;
    const actingSeat = h && h.actingSeatId ? s.seats.find((x) => x.id === h.actingSeatId) : null;
    const who = actingSeat ? actingSeat.name : null;
    const allin = h && h.allIn.includes(G.seatId);
    const waitingOffline = !!(actingSeat && !actingSeat.connected && s.phase === 'HAND');

    // Il tasto per sollecitare compare solo quando ha senso: c'è qualcuno
    // di turno, collegato, e non sono io.
    const canNudge = !!(h && h.actingSeatId && h.actingSeatId !== G.seatId && s.phase === 'HAND' && !waitingOffline);

    const note = allin
      ? 'Sei all-in. Ora si gira.'
      : waitingOffline
        ? `${esc(who)} è offline — si aspetta che rientri`
        : who ? 'Tocca a ' + esc(who) : 'Attendi…';

    return `<div class="actionbar">${myStrip}
      <div class="wait-strip">
        <p class="waiting-note" style="padding:0;flex:1;text-align:left">${note}</p>
        ${waitingOffline && isGM()
          ? '<button class="btn btn-ghost btn-sm" data-a="skip-turn" style="width:auto;margin:0;padding:0 14px;white-space:nowrap">Fai proseguire</button>'
          : ''}
        ${canNudge ? '<button class="nudge-btn" data-a="sheet-nudge" aria-label="Sollecita">👊</button>' : ''}
      </div>
    </div>`;
  }

  const legal = myLegal();
  const call = legal.find((a) => a.action === 'CALL');
  const check = legal.find((a) => a.action === 'CHECK');
  const raise = legal.find((a) => a.action === 'RAISE' || a.action === 'BET');
  const allin = legal.find((a) => a.action === 'ALLIN');
  const dis = G.pendingAction ? 'disabled' : '';

  let mid = '';
  if (check) mid = `<button class="btn btn-call" data-a="check" ${dis}>Check</button>`;
  else if (call) mid = `<button class="btn btn-call" data-a="call" ${dis}>Chiama<small>${fmt(call.amount)}</small></button>`;

  let right = '';
  if (raise) {
    right = `<button class="btn btn-raise" data-a="raise-open" ${dis}>${raise.action === 'BET' ? 'Punta' : 'Rilancia'}</button>`;
  } else if (allin) {
    right = `<button class="btn btn-raise" data-a="allin" ${dis}>All-in<small>${fmt(allin.amount)}</small></button>`;
  }

  return `<div class="actionbar is-my-turn">${myStrip}
    <div class="acts">
      <button class="btn btn-fold" data-a="fold" ${dis}>Lascio</button>
      ${mid}${right}
    </div>
  </div>`;
}

// ------------------------------------------------------------
// Sheet
// ------------------------------------------------------------
function renderSheets() {
  if (!G.sheet) return '';
  let inner = '';
  if (G.sheet === 'raise') inner = sheetRaise();
  else if (G.sheet === 'gm') inner = sheetGM();
  else if (G.sheet === 'award') inner = sheetAward();
  else if (G.sheet === 'history') inner = sheetHistory();
  else if (G.sheet === 'restore') inner = sheetRestore();
  else if (G.sheet === 'adjust') inner = sheetAdjust();
  else if (G.sheet === 'nudge') inner = sheetNudge();
  else if (G.sheet === 'players') inner = sheetPlayers();
  else if (G.sheet === 'standings') inner = sheetStandings();
  if (!inner) return '';
  return `<div class="sheet-back" data-a="sheet-close">
    <div class="sheet" data-stop="1"><div class="sheet-grip"></div>${inner}</div>
  </div>`;
}

function sheetRaise() {
  const s = G.state, m = me();
  const legal = myLegal();
  const r = legal.find((a) => a.action === 'RAISE' || a.action === 'BET');
  if (!r) return '';
  const pot = Object.values(s.hand.contributions).reduce((a, b) => a + b, 0);
  const presets = raisePresets(s.hand, m, pot);
  const v = Math.max(r.min, Math.min(r.max, G.raiseValue || r.min));
  const already = s.hand.streetContributions[G.seatId] || 0;

  // Spiega da dove esce il minimo: è la regola del No-Limit, non un capriccio.
  const why = r.action === 'BET'
    ? `Puntata minima ${fmt(r.min)}, come il buio grande`
    : `Minimo ${fmt(r.min)}: ${fmt(s.hand.currentBet)} sul tavolo più ${fmt(s.hand.minRaiseIncrement)} di rilancio`;

  // Passo dei tasti −/+ : l'incremento minimo di rilancio (o il buio grande).
  const step = Math.max(1, r.action === 'BET' ? r.min : (s.hand.minRaiseIncrement || r.min));

  return `
    <h2 style="text-align:center;margin-bottom:2px">${r.action === 'BET' ? 'Quanto punti' : 'Quanto rilanci'}</h2>
    <div class="raise-stepper">
      <button type="button" class="raise-step-btn" data-step="${-step}" aria-label="Diminuisci">−</button>
      <input type="text" class="raise-amount num" id="rv" inputmode="numeric" pattern="[0-9]*" enterkeyhint="done"
             data-min="${r.min}" data-max="${r.max}" value="${v}" aria-label="Importo, modificabile a mano">
      <button type="button" class="raise-step-btn" data-step="${step}" aria-label="Aumenta">+</button>
    </div>
    <div class="raise-sub num">Metti ${fmt(v - already)} · ti restano ${fmt(m.chips - (v - already))}</div>
    <div class="raise-why">${esc(why)}</div>
    <input type="range" id="rslider" min="${r.min}" max="${r.max}" step="1" value="${v}">
    <div class="presets">
      ${presets.map((p) => `<button data-pre="${p.value}" class="${p.value === v ? 'on' : ''}">${esc(p.label)}<br><span class="num" style="font-size:11px;opacity:.7">${fmt(p.value)}</span></button>`).join('')}
    </div>
    <button class="btn btn-primary" data-a="raise-confirm">Conferma ${fmt(v)}</button>
    <button class="btn btn-ghost btn-sm" data-a="sheet-close" style="margin-top:9px">Annulla</button>`;
}

function sheetAward() {
  const s = G.state, h = s.hand;
  if (!h || !h.pots) return '';

  const allSet = h.pots.every((p) => (G.awards[p.id] || []).length > 0);

  return `
    <h2 style="margin-bottom:4px">Chi ha vinto?</h2>
    <p class="muted" style="margin:0 0 18px">Tocca il vincitore. Per un piatto diviso, toccane più di uno.</p>
    ${h.pots.map((p) => `
      <div class="pot-award">
        <div class="pot-award-head">
          <div><div class="eyebrow">${esc(p.label)}</div></div>
          <div class="pot-award-amt num">${fmt(p.amount)}</div>
        </div>
        <div class="winner-grid">
          ${p.eligible.map((id) => {
            const seat = s.seats.find((x) => x.id === id) || {};
            const on = (G.awards[p.id] || []).includes(id);
            return `<button class="winner-chip ${on ? 'on' : ''}" data-pot="${esc(p.id)}" data-win="${esc(id)}">
              ${esc(seat.name || '?')}<span class="sub num">${fmt(seat.chips)}</span>
            </button>`;
          }).join('')}
        </div>
      </div>`).join('')}
    <button class="btn btn-primary" data-a="award-confirm" ${allSet ? '' : 'disabled'} style="margin-top:6px">
      ${allSet ? 'Assegna e prosegui' : 'Scegli chi ha vinto'}
    </button>`;
}

function sheetGM() {
  const s = G.state;
  const nxt = s.config.blindLevels[s.currentLevel + 1];
  const bl = s.config.blindLevels[s.currentLevel];
  const prog = blindProgress(s);

  const timeMode = s.config.blindMode === 'time' && nxt;

  return `
    <h2 style="margin-bottom:4px">Comandi Game Master</h2>
    <p class="muted" style="margin:0 0 14px">Bui ora ${bl.sb}/${bl.bb}${
      prog ? ` · ${prog.done} ${prog.done === 1 ? 'giro' : 'giri'} su ${prog.total}` : ''
    }</p>

    ${timeMode ? `<div class="level-bar">
      <div class="level-bar-track"><div class="level-bar-fill" data-total="${s.config.levelDurationMin * 60000}"></div></div>
      <div class="level-bar-label muted">—</div>
    </div>` : ''}

    ${nxt ? `<button class="gm-item gm-hi" data-a="level-up">
      <span class="ico">↑</span>
      <span>Alza i bui adesso<span class="desc">Porta a ${nxt.sb}/${nxt.bb}${
        s.phase === 'HAND' || s.phase === 'AWAITING_PAYOUT' ? ' dalla prossima mano' : ''
      }</span></span>
    </button>` : `<div class="gm-item" style="opacity:.45">
      <span class="ico">↑</span><span>Bui al massimo<span class="desc">Non si può salire oltre ${bl.sb}/${bl.bb}</span></span>
    </div>`}

    <button class="gm-item gm-hi" data-a="sheet-adjust">
      <span class="ico">±</span>
      <span>Correggi le fiches<span class="desc">Se un piatto è finito nelle mani sbagliate</span></span>
    </button>

    ${s.phase === 'HAND' && s.hand && s.hand.actingSeatId ? `<button class="gm-item" data-a="skip-turn">
      <span class="ico">⏭</span>
      <span>Fai proseguire il turno<span class="desc">${esc((s.seats.find((x) => x.id === s.hand.actingSeatId) || {}).name || 'Il giocatore')} tarda: gioca al posto suo</span></span>
    </button>` : ''}

    <button class="gm-item" data-a="sheet-players">
      <span class="ico">☰</span>
      <span>Giocatori e ordine<span class="desc">Cambia l'ordine dei posti o fai uscire qualcuno</span></span>
    </button>

    <div class="divider"></div>

    ${s.phase === 'STANDBY' && s.standbyReason === 'GM_PAUSE'
      ? '<button class="gm-item" data-a="resume-game"><span class="ico">▶</span><span>Riprendi la partita<span class="desc">La partita è in pausa</span></span></button>'
      : '<button class="gm-item" data-a="pause-game"><span class="ico">⏸</span><span>Metti in pausa<span class="desc">Ferma tutto e blocca il tempo</span></span></button>'}
    <button class="gm-item" data-a="undo"><span class="ico">↩</span><span>Annulla l'ultima mano<span class="desc">Torna a com'era prima</span></span></button>
    <button class="gm-item" data-a="sheet-restore"><span class="ico">⟲</span><span>Riprendi da una mano precedente<span class="desc">Scegli il punto in cui tornare</span></span></button>
    <div class="divider"></div>
    <button class="gm-item" data-a="share"><span class="ico">↗</span><span>Condividi il link<span class="desc">Codice ${esc(s.tableId)}</span></span></button>
    <button class="gm-item" data-a="toggle-sound"><span class="ico">${G.soundOn ? '🔔' : '🔕'}</span><span>Suono del turno<span class="desc">${G.soundOn ? 'Attivo' : 'Disattivato'}</span></span></button>
    <div class="divider"></div>
    <button class="gm-item" data-a="end" style="border-color:rgba(228,87,61,.35);color:#FF9A85"><span class="ico">■</span><span>Chiudi la partita<span class="desc">Mostra il resoconto finale</span></span></button>`;
}

function sheetNudge() {
  const s = G.state;
  const who = s.hand && s.hand.actingSeatId
    ? (s.seats.find((x) => x.id === s.hand.actingSeatId) || {}).name
    : null;
  if (!who) return '';

  return `
    <h2 style="margin-bottom:4px">Sollecita ${esc(who)}</h2>
    <p class="muted" style="margin:0 0 18px">Gli comparirà a tutto schermo. Una ogni 20 secondi.</p>

    ${NUDGE_PRESETS.map((txt, i) => `
      <button class="nudge-opt ${i === 0 ? 'nudge-opt-hi' : ''}" data-a="nudge-send" data-txt="${esc(txt)}">
        ${esc(txt)}
      </button>`).join('')}

    <div class="field" style="margin-top:16px">
      <label for="nudgetxt">Oppure scrivi tu</label>
      <input class="input" id="nudgetxt" maxlength="40" placeholder="Massimo 40 caratteri">
    </div>
    <button class="btn btn-primary" data-a="nudge-custom">Manda il tuo messaggio</button>
    <button class="btn btn-ghost btn-sm" data-a="sheet-close" style="margin-top:9px">Annulla</button>`;
}

function sheetAdjust() {
  const s = G.state;
  return `
    <h2 style="margin-bottom:4px">Correggi le fiches</h2>
    <p class="muted" style="margin:0 0 16px">Ogni correzione resta visibile a tutti nello storico.</p>
    <div class="field">
      <label for="adjseat">Giocatore</label>
      <select class="input" id="adjseat">
        ${s.seats.map((p) => `<option value="${esc(p.id)}">${esc(p.name)} — ${fmt(p.chips)}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label for="adjval">Fiches da aggiungere o togliere</label>
      <input class="input num" id="adjval" type="number" inputmode="numeric" placeholder="es. 250 oppure -250">
    </div>
    <div class="field">
      <label for="adjnote">Motivo</label>
      <input class="input" id="adjnote" maxlength="60" placeholder="es. piatto assegnato male">
    </div>
    <button class="btn btn-primary" data-a="adjust-confirm">Applica la correzione</button>`;
}

function sheetRestore() {
  const list = getCheckpoints().slice().reverse();
  if (list.length === 0) {
    return '<h2>Nessun punto di ripristino</h2><p class="muted" style="margin-top:8px">I punti di ripristino si creano all\'inizio di ogni mano.</p>';
  }
  return `
    <h2 style="margin-bottom:4px">Torna a una mano precedente</h2>
    <p class="muted" style="margin:0 0 16px">Le fiches tornano com'erano all'inizio di quella mano.</p>
    ${list.map((c, i) => {
      const realIdx = getCheckpoints().length - 1 - i;
      return `<button class="gm-item" data-a="restore" data-idx="${realIdx}">
        <span class="ico">${c.n}</span>
        <span>Inizio della mano ${c.n}
          <span class="desc">${new Date(c.at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })} · ${c.state.seats.map((x) => x.name + ' ' + fmt(x.chips)).join(' · ')}</span>
        </span>
      </button>`;
    }).join('')}`;
}

function sheetPlayers() {
  const s = G.state;
  const canEdit = s.phase === 'LOBBY'; // prima di iniziare o tra una mano e l'altra
  const ordered = s.seats.slice().sort((a, b) => a.seatIndex - b.seatIndex);

  return `
    <h2 style="margin-bottom:4px">Giocatori e ordine</h2>
    <p class="muted" style="margin:0 0 16px">
      ${canEdit
        ? 'Le frecce cambiano l\'ordine dei posti: è chi fa il mazziere dopo chi. La ✕ fa uscire un giocatore dal tavolo.'
        : 'A mano in corso l\'ordine è bloccato. Lo puoi cambiare tra una mano e l\'altra.'}
    </p>
    <div class="plist">
      ${ordered.map((p, i) => {
        const gm = p.id === s.gmSeatId;
        const upDis = !canEdit || i === 0;
        const downDis = !canEdit || i === ordered.length - 1;
        return `<div class="prow">
          <div class="reorder">
            <button class="ord-btn" data-a="reorder" data-seat="${esc(p.id)}" data-dir="-1" ${upDis ? 'disabled' : ''} aria-label="Sposta su">▲</button>
            <button class="ord-btn" data-a="reorder" data-seat="${esc(p.id)}" data-dir="1" ${downDis ? 'disabled' : ''} aria-label="Sposta giù">▼</button>
          </div>
          <div class="pdot ${p.connected ? '' : 'off'}"></div>
          <div class="nm">${esc(p.name)}${gm ? ' <span class="tag-mini" style="background:var(--brass);color:var(--ink)">GM</span>' : ''}</div>
          <div class="ch num">${fmt(p.chips)}</div>
          ${gm
            ? '<span style="width:36px;flex:none"></span>'
            : `<button class="kick-btn" data-a="kick" data-seat="${esc(p.id)}" ${canEdit ? '' : 'disabled'} aria-label="Fai uscire ${esc(p.name)}">✕</button>`}
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-ghost btn-sm" data-a="sheet-gm" style="margin-top:14px">Torna ai comandi</button>`;
}

function sheetStandings() {
  const s = G.state;
  const rows = settlement(s); // ordinati dal più avanti al più indietro
  return `
    <h2 style="margin-bottom:4px">Classifica</h2>

function renderOverlay() {
  const s = G.state;

  // Sollecitazione ricevuta: occupa tutto lo schermo per 3 secondi.
  // È l'unica cosa nell'app che urla, ed è giusto così.
  if (G.nudge) {
    return `<div class="overlay nudge-overlay">
      <div class="nudge-inner">
        <div class="nudge-text">${esc(G.nudge.text)}</div>
        <div class="nudge-from">— ${esc(G.nudge.from)}</div>
      </div>
    </div>`;
  }

  // Suggerimento sui bui: solo al GM, e mai sopra una mano in corso
  // che stia aspettando la sua azione.
  if (G.levelPrompt && isGM() && s) {
    const cur = s.config.blindLevels[s.currentLevel];
    const nxt = s.config.blindLevels[s.currentLevel + 1];
    if (nxt) {
      const inHand = s.phase === 'HAND' || s.phase === 'AWAITING_PAYOUT';
      return `<div class="overlay"><div class="overlay-inner">
        <div class="eyebrow" style="margin-bottom:8px">Sono passati ${s.config.levelDurationMin} minuti</div>
        <h2>Alziamo i bui?</h2>
        <div class="blind-jump">
          <span class="bj-from num">${cur.sb}/${cur.bb}</span>
          <span class="bj-arrow">→</span>
          <span class="bj-to num">${nxt.sb}/${nxt.bb}</span>
        </div>
        <p class="muted" style="margin:0 0 20px">
          ${inHand ? 'Si applica dalla prossima mano.' : 'Decidi tu: nessuna fretta.'}
        </p>
        <button class="btn btn-primary" data-a="lvl-yes">Sì, alza i bui</button>
        <div class="row" style="margin-top:10px">
          <button class="btn btn-ghost btn-sm" data-a="lvl-later" data-min="5">Fra 5 min</button>
          <button class="btn btn-ghost btn-sm" data-a="lvl-later" data-min="10">Fra 10 min</button>
        </div>
      </div></div>`;
    }
  }

  if (G.role === 'client' && (G.connState === 'lost' || G.connState === 'connecting') && s) {
    const reconnecting = G.connState === 'connecting';
    return `<div class="overlay"><div class="overlay-inner">
      <div class="spinner"></div>
      <h2>${reconnecting ? 'Ti riporto al tavolo' : 'Connessione persa'}</h2>
      <p class="muted" style="margin-top:8px">
        Il tuo posto e le tue fiches sono al sicuro.${reconnecting ? '' : ' Riprovo da solo, ma puoi anche rientrare subito.'}
      </p>
      ${reconnecting ? '' : '<button class="btn btn-primary" data-a="reconnect" style="margin-top:20px">Torna in partita</button>'}
    </div></div>`;
  }

  if (!s || s.phase !== 'STANDBY') return '';

  if (s.standbyReason === 'GM_PAUSE') {
    return `<div class="overlay"><div class="overlay-inner">
      <div style="font-size:44px;margin-bottom:14px">⏸</div>
      <h2>Partita in pausa</h2>
      <p class="muted" style="margin-top:8px">Il Game Master la riprenderà a breve.</p>
      ${isGM() ? '<button class="btn btn-primary" data-a="resume-game" style="margin-top:20px">Riprendi</button>' : ''}
    </div></div>`;
  }

  const missing = s.seats.filter((x) =>
    !x.connected && s.hand && s.hand.inHand.includes(x.id) &&
    !s.hand.folded.includes(x.id) && !s.hand.allIn.includes(x.id));

  return `<div class="overlay"><div class="overlay-inner">
    <div class="spinner"></div>
    <h2>Si aspetta ${esc(missing.map((x) => x.name).join(' e ')) || 'un giocatore'}</h2>
    <p class="muted" style="margin-top:8px">
      La mano riprende appena si ricollega. Il tempo è fermo e nessuno perde fiches.
    </p>
    ${missing.length ? `<div class="wait-list">
      ${missing.map((x) => `<div class="wait-row">
        <span class="wait-name">${esc(x.name)}</span>
        <span class="wait-time num" data-since="${x.lastSeen || Date.now()}">—</span>
      </div>`).join('')}
    </div>` : ''}
    ${isGM() && missing.length ? `<div style="margin-top:20px">
      <p class="muted" style="font-size:12px;margin:0 0 10px">
        Se non riesce a tornare, puoi farlo uscire da questa mano. Le fiches già puntate restano nel piatto.
      </p>
      ${missing.map((x) => `<button class="btn btn-ghost btn-sm" data-a="force-fold" data-seat="${esc(x.id)}" style="margin-bottom:8px">Fai lasciare la mano a ${esc(x.name)}</button>`).join('')}
    </div>` : ''}
  </div></div>`;
}

// ============================================================
// BIND — event delegation, ticker del timer, avvio

let ticker = null;

/** Traduce gli errori tecnici in qualcosa di azionabile. */
function humanError(err) {
  const m = (err && err.message) || '';
  if (m === 'NO_PEERJS' || /is not a constructor|Peer is not defined/i.test(m)) {
    return 'Manca il collegamento a internet per avviare il tavolo. ' +
           'Serve solo per far trovare i telefoni fra loro: connettiti e riprova.';
  }
  if (/Timeout|Nessuna risposta/i.test(m)) {
    return 'Il tavolo non risponde. Controlla che il Game Master abbia l\'app aperta.';
  }
  return m || 'Qualcosa non ha funzionato';
}

/** Le due librerie esterne sono presenti? */
function librariesReady() {
  return typeof window.Peer === 'function';
}

/** Aggiorna gli anelli del timer senza ridisegnare tutta la UI. */
function startTicker() {
  clearInterval(ticker);
  const rings = document.querySelectorAll('.timer-ring');
  const waits = document.querySelectorAll('.wait-time');
  const bars = document.querySelectorAll('.level-bar-fill');
  if (!rings.length && !waits.length && !bars.length) return;

  const tick = () => {
    // Da quanto stiamo aspettando un giocatore.
    document.querySelectorAll('.wait-time').forEach((el) => {
      const since = +el.dataset.since;
      const secs = Math.max(0, Math.floor((Date.now() - since) / 1000));
      el.textContent = secs < 60
        ? secs + ' s'
        : Math.floor(secs / 60) + ' min ' + String(secs % 60).padStart(2, '0') + ' s';
    });

    // Avanzamento del livello a tempo.
    document.querySelectorAll('.level-bar-fill').forEach((el) => {
      const total = +el.dataset.total;
      const el2 = Host.levelElapsedMs();
      const f = Math.max(0, Math.min(1, el2 / total));
      el.style.width = (f * 100).toFixed(1) + '%';
      const lbl = el.parentElement.parentElement.querySelector('.level-bar-label');
      if (lbl) {
        const left = Math.max(0, total - el2);
        const m = Math.floor(left / 60000), sec = Math.floor((left % 60000) / 1000);
        lbl.textContent = m > 0 ? m + ' min al prossimo livello' : sec + ' s al prossimo livello';
      }
    });

    document.querySelectorAll('.timer-ring').forEach((svg) => {
      const deadline = +svg.dataset.deadline;
      const total = +svg.dataset.total || 45000;
      const left = Math.max(0, deadline - Date.now());
      const frac = Math.max(0, Math.min(1, left / total));
      const fg = svg.querySelector('.fg');
      if (fg) fg.style.strokeDashoffset = String(182 * (1 - frac));
      svg.classList.toggle('low', frac < 0.25);
    });
  };
  tick();
  ticker = setInterval(tick, 1000);
}

function drawQR() {

async function shareLink(text, url) {
  try {
    if (navigator.share) {
      await navigator.share({ title: 'Fiches', text, url });
      return;
    }
  } catch (_) { return; }
  try {
    await navigator.clipboard.writeText(url || text);
    toast('Link copiato');
  } catch (_) {
    toast(url || text);
  }
}

// ------------------------------------------------------------
// Event delegation
// ------------------------------------------------------------
function bind() {
  const root = app();

  // --- rilancio: slider, tastiera e tasti −/+ scrivono lo stesso valore ---
  const slider = $('rslider');
  const rvInput = $('rv');

  // Aggiorna slider, conti, preset e tasto conferma. writeField=false mentre
  // si digita, così il campo non "salta" sotto le dita.
  const syncRaise = (val, writeField) => {
    const min = slider ? +slider.min : (rvInput ? +rvInput.dataset.min : 0);
    const max = slider ? +slider.max : (rvInput ? +rvInput.dataset.max : 0);
    const v = Math.max(min, Math.min(max, Math.round(val || 0)));
    G.raiseValue = v;
    if (slider) slider.value = v;
    if (rvInput && writeField) rvInput.value = v;
    const m = me();
    const already = G.state.hand.streetContributions[G.seatId] || 0;
    const sub = document.querySelector('.raise-sub');
    if (sub && m) {
      sub.textContent = `Metti ${fmt(v - already)} · ti restano ${fmt(m.chips - (v - already))}`;
    }
    document.querySelectorAll('.presets button').forEach((b) => {
      b.classList.toggle('on', +b.dataset.pre === v);
    });
    const cb = document.querySelector('[data-a="raise-confirm"]');
    if (cb) cb.textContent = 'Conferma ' + fmt(v);
  };

  if (slider) slider.oninput = (e) => syncRaise(+e.target.value, true);

  if (rvInput) {
    // Mentre si digita: tiene solo le cifre e aggiorna i conti, senza
    // forzare il valore minimo (così si può scrivere "5" prima di "50").
    rvInput.oninput = () => {
      const digits = rvInput.value.replace(/[^0-9]/g, '');
      if (digits !== rvInput.value) rvInput.value = digits;
      syncRaise(digits === '' ? 0 : +digits, false);
    };
    // A conferma o all'uscita dal campo: normalizza entro i limiti.
    rvInput.onchange = () => syncRaise(+rvInput.value || 0, true);
    rvInput.onblur = () => syncRaise(+rvInput.value || 0, true);
    rvInput.onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        syncRaise(+rvInput.value || 0, true);
        rvInput.blur();
        handle('raise-confirm', rvInput, e);
      }
    };
  }

  root.onclick = (e) => {
    // --- tasti −/+ del rilancio (non ridisegna: mantiene il focus) ---
    const stepBtn = e.target.closest('[data-step]');
    if (stepBtn) {
      syncRaise((G.raiseValue || 0) + (+stepBtn.dataset.step), true);
      return;
    }

    // --- preset del rilancio ---
    const pre = e.target.closest('[data-pre]');
    if (pre) {
      G.raiseValue = +pre.dataset.pre;
      render();
      return;
    }

    // --- selezione vincitore ---
    const win = e.target.closest('[data-win]');
    if (win) {
      const potId = win.dataset.pot, seatId = win.dataset.win;
      const cur = G.awards[potId] || [];
      G.awards[potId] = cur.includes(seatId)
        ? cur.filter((x) => x !== seatId)
        : cur.concat([seatId]);
      if (G.awards[potId].length === 0) delete G.awards[potId];
      render();
      return;
    }

    // --- taglio d'ingresso ---
    const buy = e.target.closest('[data-buy]');
    if (buy) {
      document.querySelectorAll('#cbuyseg button').forEach((b) => b.classList.remove('on'));
      buy.classList.add('on');
      return;
    }

    // --- criterio di aumento dei bui ---
    const md = e.target.closest('[data-mode]');
    if (md) {
      document.querySelectorAll('#cmodeseg button').forEach((b) => b.classList.remove('on'));
      md.classList.add('on');
      const mode = md.dataset.mode;
      $('ctimewrap').style.display = mode === 'time' ? 'block' : 'none';
      $('corbwrap').style.display = mode === 'orbits' ? 'block' : 'none';
      const hint = $('cmodehint');
      if (hint) {
        hint.textContent = mode === 'off'
          ? 'I bui restano uguali per tutta la partita. Potrai alzarli a mano quando vuoi.'
          : mode === 'time'
            ? 'Allo scadere ti propone di alzarli: decidi tu se farlo o rimandare. Il conto si ferma nelle pause e mentre si aspetta un giocatore.'
            : 'I bui salgono dopo un numero fisso di giri di tavolo.';
      }
      return;
    }

    // --- giri per livello ---
    const orb = e.target.closest('[data-orb]');
    if (orb) {
      document.querySelectorAll('#corbseg button').forEach((b) => b.classList.remove('on'));
      orb.classList.add('on');
      return;
    }

    // --- segmented: durata livello ---
    const lv = e.target.closest('[data-lv]');
    if (lv) {
      document.querySelectorAll('#cseg button').forEach((b) => b.classList.remove('on'));
      lv.classList.add('on');
      return;
    }
    const to = e.target.closest('[data-to]');
    if (to) {
      document.querySelectorAll('#ctseg button').forEach((b) => b.classList.remove('on'));
      to.classList.add('on');
      return;
    }

    const el = e.target.closest('[data-a]');
    if (!el) return;
    const a = el.dataset.a;

    // Il foglio si chiude SOLO toccando lo sfondo scuro o un tasto di chiusura
    // esplicito (es. "Annulla"). Un tocco sul contenuto inerte — il campo della
    // puntata, un'etichetta, la maniglia — non deve farlo sparire.
    if (a === 'sheet-close') {
      const onBackdrop = e.target.classList && e.target.classList.contains('sheet-back');
      const onCloseControl = e.target.closest('.sheet [data-a="sheet-close"]');
      if (!onBackdrop && !onCloseControl) return;
    }

    handle(a, el, e);
  };
}

function handle(a, el, e) {
  const s = G.state;

  switch (a) {
    // ---------- navigazione ----------
    case 'home':
      G.role = null; G.state = null; G.screen = 'home';
      if (G.transport) { G.transport.destroy(); G.transport = null; }
      location.hash = '';
      render();
      break;

    case 'go-create':
      G.screen = 'create';
      app().innerHTML = screenCreate();
      bind();
      break;

    case 'tg-custom': {
      const box = $('ccustom');
      const seg = $('cbuyseg');
      const open = box.style.display === 'none';
      box.style.display = open ? 'block' : 'none';
      seg.style.display = open ? 'none' : 'grid';
      $('ccustombtn').textContent = open
        ? 'Torna ai tagli predefiniti'
        : 'Preferisco impostare io i valori';
      break;
    }


    // ---------- creazione ----------
    case 'create': {
      const gm = ($('cgm').value || '').trim();
      if (!gm) { toast('Serve il tuo nome'); $('cgm').focus(); return; }
      saveName(gm);
      const modeBtn = document.querySelector('#cmodeseg button.on');
      const blindMode = modeBtn ? modeBtn.dataset.mode : 'off';
      const lvBtn = document.querySelector('#cseg button.on');
      const orbBtn = document.querySelector('#corbseg button.on');
      const toBtn = document.querySelector('#ctseg button.on');
      // Taglio predefinito, oppure valori inseriti a mano.
      const usingCustom = $('ccustom').style.display !== 'none';
      let buyIn, chips, bb;
      if (usingCustom) {
        buyIn = Math.max(1, +$('cbuy').value || 10);
        chips = Math.max(100, +$('cchips').value || 1000);
        bb = Math.max(2, +$('cbb').value || 20);
      } else {
        const sel = document.querySelector('#cbuyseg button.on');
        const preset = BUYINS.find((b) => b.euro === (sel ? +sel.dataset.buy : 10)) || BUYINS[1];
        buyIn = preset.euro; chips = preset.chips; bb = preset.bb;
      }

      const cfg = {
        gmName: gm,
        tableName: ($('ctname').value || '').trim() || 'Tavolo',
        buyIn, chips, bb,
        blindMode,
        levelMin: lvBtn ? +lvBtn.dataset.lv : 20,
        orbitsPerLevel: orbBtn ? +orbBtn.dataset.orb : 2,
        timeout: toBtn ? +toBtn.dataset.to : 0,
      };
      if (!librariesReady()) {
        toast(humanError(new Error('NO_PEERJS')), 5200);
        return;
      }
      el.disabled = true;
      el.textContent = 'Apro il tavolo…';
      Host.create(cfg).catch((err) => {
        toast(humanError(err), 5200);
        el.disabled = false;
        el.textContent = 'Apri il tavolo';
      });
      break;
    }

    // ---------- ingresso ----------
    case 'join': {
      const code = ($('jcode').value || '').trim().toUpperCase();
      const name = ($('jname').value || '').trim();
      if (code.length !== 4) { toast('Il codice ha 4 caratteri'); $('jcode').focus(); return; }
      if (!name) { toast('Serve il tuo nome'); $('jname').focus(); return; }
      saveName(name);
      if (!librariesReady()) {
        toast(humanError(new Error('NO_PEERJS')), 5200);
        return;
      }
      Client.join(code, name).catch((err) => {
        toast(humanError(err), 5200);
        G.role = null; G.connState = 'idle';
        render();
      });
      break;
    }

    case 'resume': {
      const saved = loadSession();
      if (!librariesReady()) { toast(humanError(new Error('NO_PEERJS')), 5200); return; }
      if (saved) Host.resume(saved).catch((err) => toast(humanError(err), 5200));
      break;
    }

    case 'discard':
      clearSession();
      render();
      toast('Partita eliminata');
      break;

    // ---------- partita ----------
    case 'start':
      Host.startHand();
      break;

    case 'fold':
      if (confirmFoldNeeded()) { doAction('FOLD'); }
      break;

    case 'check': doAction('CHECK'); break;
    case 'call': doAction('CALL'); break;
    case 'allin': doAction('ALLIN'); break;

    case 'raise-open': {
      const legal = myLegal();
      const r = legal.find((x) => x.action === 'RAISE' || x.action === 'BET');
      if (!r) return;
      G.raiseValue = r.min;
      G.sheet = 'raise';
      render();
      break;
    }

    case 'raise-confirm': {
      const legal = myLegal();
      const r = legal.find((x) => x.action === 'RAISE' || x.action === 'BET');
      if (!r) return;
      const v = Math.max(r.min, Math.min(r.max, G.raiseValue || r.min));
      G.sheet = null;
      doAction(v >= r.max ? 'ALLIN' : r.action, v);
      break;
    }

    // ---------- assegnazione ----------
    case 'award-confirm': {
      const ok = Host.cmd({ t: CMD.DECLARE_WINNERS, awards: G.awards });
      if (ok) {
        G.awards = {};
        G.sheet = null;
        buzz(60);
        render();
      }
      break;
    }

    // ---------- sheet ----------
    case 'sheet-close': G.sheet = null; render(); break;
    case 'sheet-nudge': G.sheet = 'nudge'; render(); break;

    case 'nudge-send':
      sendNudge(el.dataset.txt);
      break;

    case 'nudge-custom': {
      const inp = $('nudgetxt');
      const txt = (inp && inp.value || '').trim();
      if (!txt) { toast('Scrivi qualcosa'); inp && inp.focus(); return; }
      sendNudge(txt);
      break;
    }
    case 'sheet-gm': G.sheet = 'gm'; render(); break;
    case 'sheet-history': G.sheet = 'history'; render(); break;
    case 'sheet-adjust': G.sheet = 'adjust'; render(); break;
    case 'sheet-restore': G.sheet = 'restore'; render(); break;
    case 'sheet-players': G.sheet = 'players'; render(); break;
    case 'sheet-standings': G.sheet = 'standings'; render(); break;

    case 'reconnect':
      reconnectClient();
      break;

    case 'sheet-award': {
      // Vincitore unico: assegnazione immediata, senza far scegliere.
      const h = s.hand;
      if (h && h.autoWinner && h.pots.length === 1) {
        Host.cmd({ t: CMD.DECLARE_WINNERS, awards: { [h.pots[0].id]: [h.autoWinner] } });
        buzz(60);
        return;
      }
      G.awards = {};
      // Precompila i pot con un solo eleggibile.
      if (h) for (const p of h.pots) if (p.eligible.length === 1) G.awards[p.id] = [p.eligible[0]];
      G.sheet = 'award';
      render();
      break;
    }

    // ---------- comandi GM ----------
    case 'lvl-yes':
      Host.acceptLevelUp();
      break;

    case 'lvl-later':
      Host.postponeLevelUp(+el.dataset.min || 5);
      toast('Ti richiedo fra ' + (el.dataset.min || 5) + ' minuti');
      break;

    case 'level-up': {
      const nxt = G.state.config.blindLevels[G.state.currentLevel + 1];
      if (!nxt) { toast('Sei già all\'ultimo livello di bui'); return; }
      const inHand = G.state.phase === 'HAND' || G.state.phase === 'AWAITING_PAYOUT';
      const q = inHand
        ? `Portare i bui a ${nxt.sb}/${nxt.bb} dalla prossima mano?`
        : `Portare i bui a ${nxt.sb}/${nxt.bb}?`;
      if (!confirm(q)) return;
      if (Host.cmd({ t: CMD.LEVEL_UP })) {
        G.sheet = null;
        render();
        toast(inHand ? 'Bui a ' + nxt.sb + '/' + nxt.bb + ' dalla prossima mano' : 'Bui a ' + nxt.sb + '/' + nxt.bb);
        buzz([50, 40, 50]);
      }
      break;
    }

    case 'pause-game': Host.cmd({ t: CMD.PAUSE }); G.sheet = null; render(); break;
    case 'resume-game': Host.cmd({ t: CMD.RESUME }); G.sheet = null; render(); break;

    case 'undo':
      if (confirm('Annullare l\'ultima mano? Le fiches tornano com\'erano prima.')) {
        Host.undoLastHand();
      }
      break;

    case 'restore': {
      const idx = +el.dataset.idx;
      if (confirm('Tornare all\'inizio della mano ' + (getCheckpoints()[idx] || {}).n + '?')) {
        Host.restoreCheckpoint(idx);
      }
      break;
    }

    case 'adjust-confirm': {
      const seatId = $('adjseat').value;
      const delta = Math.round(+$('adjval').value || 0);
      const note = ($('adjnote').value || '').trim();
      if (!delta) { toast('Inserisci un valore'); return; }
      if (Host.cmd({ t: CMD.ADJUST, seatId, delta, note })) {
        G.sheet = null;
        render();
        toast('Correzione applicata');
      }
      break;
    }

    case 'force-fold': {
      const seatId = el.dataset.seat;
      const seat = s.seats.find((x) => x.id === seatId);
      if (confirm('Far lasciare la mano a ' + (seat ? seat.name : '') + '?')) {
        Host.cmd({
          t: CMD.PLAYER_ACTION, seatId,
          handId: s.hand.handId, seq: s.hand.actionSeq, action: 'FOLD',
        });
      }
      break;
    }

    // Il GM fa proseguire la mano al posto di chi tarda: check se può,
    // altrimenti fold. Sostituisce il vecchio timer, ma è una scelta umana.
    case 'skip-turn': {
      const h = s.hand;
      if (!h || !h.actingSeatId || s.phase !== 'HAND') return;
      const seat = s.seats.find((x) => x.id === h.actingSeatId);
      if (!seat) return;
      const canCheck = (legalActions(h, seat) || []).some((x) => x.action === 'CHECK');
      const verb = canCheck ? 'passare la parola (check)' : 'far lasciare la mano (fold)';
      if (!confirm(`${seat ? seat.name : 'Il giocatore'} non agisce: vuoi ${verb} al posto suo?`)) return;
      Host.cmd({
        t: CMD.PLAYER_ACTION, seatId: h.actingSeatId,
        handId: h.handId, seq: h.actionSeq, action: canCheck ? 'CHECK' : 'FOLD',
      });
      G.sheet = null;
      render();
      break;
    }

    // Fai uscire un giocatore dal tavolo (solo tra una mano e l'altra).
    case 'kick': {
      const seatId = el.dataset.seat;
      const seat = s.seats.find((x) => x.id === seatId);
      if (!seat) return;
      if (seatId === s.gmSeatId) { toast('Non puoi far uscire il Game Master'); return; }
      if (!confirm('Far uscire ' + seat.name + ' dal tavolo? Le sue fiches escono dal conteggio.')) return;
      if (Host.cmd({ t: CMD.KICK, seatId })) {
        toast(seat.name + ' è uscito dal tavolo');
        render();
      }
      break;
    }

    // Sposta un giocatore nell'ordine del tavolo (su/giù).
    case 'reorder': {
      const seatId = el.dataset.seat;
      const dir = +el.dataset.dir || 0;
      if (Host.cmd({ t: CMD.REORDER, seatId, dir }, true)) {
        render();
      } else {
        toast('Puoi cambiare l\'ordine solo tra una mano e l\'altra');
      }
      break;
    }

    case 'toggle-sound':
      G.soundOn = !G.soundOn;
      if (G.soundOn) ping();
      render();
      break;

    case 'share':
      shareLink('Entra nel tavolo ' + G.tableCode, joinUrl());
      break;

    case 'copy-link':
      navigator.clipboard && navigator.clipboard.writeText(joinUrl())
        .then(() => toast('Link copiato'))
        .catch(() => toast('Copialo a mano dal riquadro'));
      break;

    case 'share-results': {
      const rows = settlement(s);
      const txt = s.name + '\n' + rows.map((r, i) => `${i + 1}. ${r.name} ${euro(r.net)}`).join('\n');
      shareLink(txt, '');
      break;
    }

    case 'end':
      if (confirm('Chiudere la partita e vedere il resoconto?')) {
        Host.cmd({ t: CMD.END_SESSION });
        clearInterval(Host.levelTimer);
        clearTimeout(Host.timer);
        G.sheet = null;
        render();
      }
      break;

    case 'new-game':
      clearSession();
      G.role = null; G.state = null;
      if (G.transport) { G.transport.destroy(); G.transport = null; }
      location.hash = '';
      render();
      break;
  }
}

/** Chiede conferma solo quando lasciare è chiaramente uno spreco. */
function confirmFoldNeeded() {
  const legal = myLegal();
  const canCheck = legal.some((a) => a.action === 'CHECK');
  if (!canCheck) return true;
  return confirm('Puoi restare in gioco senza pagare. Lasciare comunque?');
}

// ------------------------------------------------------------
// Avvio
// ------------------------------------------------------------
window.addEventListener('DOMContentLoaded', () => {
  // Un link con #CODICE porta direttamente alla schermata d'ingresso.
  render();

  const code = (location.hash || '').replace('#', '').toUpperCase();
  if (code.length === 4 && savedName() && librariesReady()) {
    // Nome già noto: entra subito.
    Client.join(code, savedName()).catch((err) => {
      G.role = null; G.connState = 'idle'; render();
      toast(humanError(err), 5200);
    });
  }
});

// Avvisa prima di chiudere: se il GM chiude, la partita si ferma.
window.addEventListener('beforeunload', (e) => {
  if (G.role === 'host' && G.state && G.state.phase !== 'FINISHED' && G.state.handNumber > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

</script>

</html>
