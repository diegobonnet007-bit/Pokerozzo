function screenTable() {
  const s = G.state;
  const h = s.hand;
  const m = me();
  const bl = s.config.blindLevels[s.currentLevel];
  const pot = h ? Object.values(h.contributions).reduce((a, b) => a + b, 0) : 0;

  const active = s.seats.filter((x) => !x.eliminated || (h && h.inHand.includes(x.id)));
  const n = Math.max(active.length, 2);

  // Il giocatore locale sempre in basso: ruota il cerchio di conseguenza.
  const myIdx = active.findIndex((x) => x.id === G.seatId);
  const rot = myIdx >= 0 ? myIdx : 0;

  const seatsHtml = active.map((p, i) => {
    const pos = (i - rot + n) % n;
    const angle = (pos / n) * 2 * Math.PI + Math.PI / 2;
    const x = 50 + 47 * Math.cos(angle);
    const y = 50 + 41 * Math.sin(angle);

    const folded = h && h.folded.includes(p.id);
    const allin = h && h.allIn.includes(p.id);
    const acting = h && h.actingSeatId === p.id && s.phase === 'HAND';
    const bet = h ? (h.streetContributions[p.id] || 0) : 0;

    let badge = '';
    if (h) {
      if (p.id === h.buttonSeatId) badge = '<div class="pos-badge">D</div>';
      else if (p.id === h.sbSeatId) badge = '<div class="pos-badge sb">SB</div>';
      else if (p.id === h.bbSeatId) badge = '<div class="pos-badge bb">BB</div>';
    }

    let tag = '';
    if (p.eliminated) tag = '<span class="tag-mini tag-out">Fuori</span>';
    else if (allin) tag = '<span class="tag-mini tag-allin">All-in</span>';
    else if (!p.connected) tag = '<span class="tag-mini tag-off">Offline</span>';

    // Anello del timer attorno a chi sta giocando.
    let ring = '';
    if (acting && h.deadline && s.config.actionTimeoutSec > 0) {
      ring = `<svg class="timer-ring" data-deadline="${h.deadline}" data-total="${s.config.actionTimeoutSec * 1000}" viewBox="0 0 62 62">
        <circle class="bg" cx="31" cy="31" r="29"></circle>
        <circle class="fg" cx="31" cy="31" r="29" stroke-dasharray="182" stroke-dashoffset="0"></circle>
      </svg>`;
    }

    return `<div class="seat ${folded ? 'folded' : ''} ${p.eliminated ? 'eliminated' : ''}" style="left:${x}%;top:${y}%">
      <div class="avatar ${p.id === G.seatId ? 'me' : ''} ${acting ? 'acting' : ''} ${allin ? 'allin' : ''} ${p.connected ? '' : 'off'}">
        ${esc(p.name.slice(0, 2).toUpperCase())}
        ${badge}${ring}
        ${bet > 0 ? `<div class="seat-bet num">${fmt(bet)}</div>` : ''}
      </div>
      <div class="seat-name">${esc(p.name)}</div>
      <div class="seat-chips num">${fmt(p.chips)}</div>
      ${tag}
    </div>`;
  }).join('');

  // Piatto: mostra i side pot separatamente quando esistono.
  let potSide = '';
  if (h && h.pots && h.pots.length > 1) {
    potSide = h.pots.map((p) => `${p.label}: ${fmt(p.amount)}`).join(' · ');
  }

  return `
  <div class="table-wrap">
    <div class="topbar">
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
        <span class="chip-badge">Bui ${bl.sb}/${bl.bb}</span>
        <span class="chip-badge" style="background:rgba(242,237,227,.06);border-color:rgba(242,237,227,.15);color:var(--bone-dim)">Mano ${s.handNumber}</span>
      </div>
      <div style="display:flex;gap:7px">
        <button class="icon-btn" data-a="sheet-history" aria-label="Storico">≡</button>
        ${isGM() ? '<button class="icon-btn" data-a="sheet-gm" aria-label="Comandi Game Master" style="background:rgba(232,176,75,.14);border-color:rgba(232,176,75,.35);color:var(--brass)">⚙</button>' : ''}
      </div>
    </div>

    <div class="felt">
      <div class="pot-core">
        <div class="pot-label">Piatto</div>
        <div class="pot-value num">${fmt(pot)}</div>
        ${pot > 0 ? `<div class="pot-euro num">${potInEuro(pot)}</div>` : ''}
        ${potSide ? `<div class="pot-side num">${esc(potSide)}</div>` : ''}
        ${h ? `<div class="street-tag">${STREET_IT[h.street] || ''}</div>` : ''}
      </div>
      ${seatsHtml}
    </div>

    ${renderActionBar()}
  </div>`;
}

function renderActionBar() {
  const s = G.state;
  const m = me();

  if (s.phase === 'AWAITING_PAYOUT') {
    return `<div class="actionbar">
      ${isGM()
        ? '<button class="btn btn-primary" data-a="sheet-award">Assegna il piatto</button>'
        : '<p class="waiting-note">Il Game Master sta assegnando il piatto</p>'}
    </div>`;
  }

  if (s.phase === 'LOBBY') {
    return `<div class="actionbar">
      ${isGM()
        ? '<button class="btn btn-primary" data-a="start">Mano successiva</button>'
        : '<p class="waiting-note">In attesa della mano successiva</p>'}
    </div>`;
  }

  if (!m || m.eliminated) {
    return `<div class="actionbar"><p class="waiting-note">Sei fuori dal gioco. Guarda come finisce.</p></div>`;
  }

  const myStrip = `<div class="my-strip">
    <div><div class="lbl">Le tue fiches</div></div>
    <div class="val num">${fmt(m.chips)}</div>
  </div>`;

  if (!isMyTurn()) {
    const h = s.hand;
    const who = h && h.actingSeatId
      ? (s.seats.find((x) => x.id === h.actingSeatId) || {}).name
      : null;
    const allin = h && h.allIn.includes(G.seatId);
    return `<div class="actionbar">${myStrip}
      <p class="waiting-note">${allin ? 'Sei all-in. Ora si gira.' : who ? 'Tocca a ' + esc(who) : 'Attendi…'}</p>
    </div>`;
  }

  const legal = myLegal();
  const call = legal.find((a) => a.action === 'CALL');
  const check = legal.find((a) => a.action === 'CHECK');
  const raise = legal.find((a) => a.action === 'RAISE' || a.action === 'BET');
  const allin = legal.find((a) => a.action === 'ALLIN');
  const dis = G.pendingAction ? 'disabled' : '';

  let mid = '';
  if (check) mid = `<button class="btn btn-call" data-a="check" ${dis}>Check</button>`;
  else if (call) mid = `<button class="btn btn-call" data-a="call" ${dis}>Chiama<small>${fmt(call.amount)}</small></button>`;

  let right = '';
  if (raise) {
    right = `<button class="btn btn-raise" data-a="raise-open" ${dis}>${raise.action === 'BET' ? 'Punta' : 'Rilancia'}</button>`;
  } else if (allin) {
    right = `<button class="btn btn-raise" data-a="allin" ${dis}>All-in<small>${fmt(allin.amount)}</small></button>`;
  }

  return `<div class="actionbar">${myStrip}
    <div class="acts">
      <button class="btn btn-fold" data-a="fold" ${dis}>Lascio</button>
      ${mid}${right}
    </div>
  </div>`;
}

function renderSheets() {
  if (!G.sheet) return '';
  let inner = '';
  if (G.sheet === 'raise') inner = sheetRaise();
  else if (G.sheet === 'gm') inner = sheetGM();
  else if (G.sheet === 'award') inner = sheetAward();
  else if (G.sheet === 'history') inner = sheetHistory();
  else if (G.sheet === 'restore') inner = sheetRestore();
  else if (G.sheet === 'adjust') inner = sheetAdjust();
  if (!inner) return '';
  return `<div class="sheet-back" data-a="sheet-close">
    <div class="sheet" data-stop="1"><div class="sheet-grip"></div>${inner}</div>
  </div>`;
}

function sheetRaise() {
  const s = G.state, m = me();
  const legal = myLegal();
  const r = legal.find((a) => a.action === 'RAISE' || a.action === 'BET');
  if (!r) return '';
  const pot = Object.values(s.hand.contributions).reduce((a, b) => a + b, 0);
  const presets = raisePresets(s.hand, m, pot);
  const v = Math.max(r.min, Math.min(r.max, G.raiseValue || r.min));
  const already = s.hand.streetContributions[G.seatId] || 0;

  return `
    <h2 style="text-align:center;margin-bottom:2px">${r.action === 'BET' ? 'Quanto punti' : 'Quanto rilanci'}</h2>
    <div class="raise-amount num" id="rv">${fmt(v)}</div>
    <div class="raise-sub num">Metti ${fmt(v - already)} · ti restano ${fmt(m.chips - (v - already))}</div>
    <input type="range" id="rslider" min="${r.min}" max="${r.max}" step="1" value="${v}">
    <div class="presets">
      ${presets.map((p) => `<button data-pre="${p.value}" class="${p.value === v ? 'on' : ''}">${esc(p.label)}<br><span class="num" style="font-size:11px;opacity:.7">${fmt(p.value)}</span></button>`).join('')}
    </div>
    <button class="btn btn-primary" data-a="raise-confirm">Conferma ${fmt(v)}</button>
    <button class="btn btn-ghost btn-sm" data-a="sheet-close" style="margin-top:9px">Annulla</button>`;
}

let ticker = null;

/** Traduce gli errori tecnici in qualcosa di azionabile. */
function humanError(err) {
  const m = (err && err.message) || '';
  if (m === 'NO_PEERJS' || /is not a constructor|Peer is not defined/i.test(m)) {
    return 'Manca il collegamento a internet per avviare il tavolo. ' +
           'Serve solo per far trovare i telefoni fra loro: connettiti e riprova.';
  }
  if (/Timeout|Nessuna risposta/i.test(m)) {
    return 'Il tavolo non risponde. Controlla che il Game Master abbia l\'app aperta.';
  }
  return m || 'Qualcosa non ha funzionato';
}

/** Le due librerie esterne sono presenti? */
function librariesReady() {
  return typeof window.Peer === 'function';
}

/** Aggiorna gli anelli del timer senza ridisegnare tutta la UI. */
function startTicker() {
  clearInterval(ticker);
  const rings = document.querySelectorAll('.timer-ring');
  if (!rings.length) return;

  const tick = () => {
    document.querySelectorAll('.timer-ring').forEach((svg) => {
      const deadline = +svg.dataset.deadline;
      const total = +svg.dataset.total || 45000;
      const left = Math.max(0, deadline - Date.now());
      const frac = Math.max(0, Math.min(1, left / total));
      const fg = svg.querySelector('.fg');
      if (fg) fg.style.strokeDashoffset = String(182 * (1 - frac));
      svg.classList.toggle('low', frac < 0.25);
    });
  };
  tick();
  ticker = setInterval(tick, 1000);
}

function drawQR() {
  const box = $('qrbox');
  if (!box || !window.QRCode || !G.tableCode) return;
  box.innerHTML = '';
  const canvas = document.createElement('canvas');
  box.appendChild(canvas);
  window.QRCode.toCanvas(canvas, joinUrl(), {
    width: 168, margin: 1,
    color: { dark: '#071612', light: '#F2EDE3' },
  }, () => {});
}

async function shareLink(text, url) {
  try {
    if (navigator.share) {
      await navigator.share({ title: 'Fiches', text, url });
      return;
    }
  } catch (_) { return; }
  try {
    await navigator.clipboard.writeText(url || text);
    toast('Link copiato');
  } catch (_) {
    toast(url || text);
  }
}

// ------------------------------------------------------------
// Event delegation
// ------------------------------------------------------------
function bind() {
  const root = app();

  // --- slider del rilancio: aggiorna solo i numeri, non ridisegna ---
  const slider = $('rslider');
  if (slider) {
    slider.oninput = (e) => {
      G.raiseValue = +e.target.value;
      const rv = $('rv');
      if (rv) rv.textContent = fmt(G.raiseValue);
      const m = me();
      const already = G.state.hand.streetContributions[G.seatId] || 0;
      const sub = document.querySelector('.raise-sub');
      if (sub && m) {
        sub.textContent = `Metti ${fmt(G.raiseValue - already)} · ti restano ${fmt(m.chips - (G.raiseValue - already))}`;
      }
      document.querySelectorAll('.presets button').forEach((b) => {
        b.classList.toggle('on', +b.dataset.pre === G.raiseValue);
      });
      const cb = document.querySelector('[data-a="raise-confirm"]');
      if (cb) cb.textContent = 'Conferma ' + fmt(G.raiseValue);
    };
  }

  root.onclick = (e) => {
    // --- preset del rilancio ---
    const pre = e.target.closest('[data-pre]');
    if (pre) {
      G.raiseValue = +pre.dataset.pre;
      render();
      return;
    }

    // --- selezione vincitore ---
    const win = e.target.closest('[data-win]');
    if (win) {
      const potId = win.dataset.pot, seatId = win.dataset.win;
      const cur = G.awards[potId] || [];
      G.awards[potId] = cur.includes(seatId)
        ? cur.filter((x) => x !== seatId)
        : cur.concat([seatId]);
      if (G.awards[potId].length === 0) delete G.awards[potId];
      render();
      return;
    }

    // --- taglio d'ingresso ---
    const buy = e.target.closest('[data-buy]');
    if (buy) {
      document.querySelectorAll('#cbuyseg button').forEach((b) => b.classList.remove('on'));
      buy.classList.add('on');
      return;
    }

    // --- segmented: durata livello ---
    const lv = e.target.closest('[data-lv]');
    if (lv) {
      document.querySelectorAll('#cseg button').forEach((b) => b.classList.remove('on'));
      lv.classList.add('on');
      return;
    }
    const to = e.target.closest('[data-to]');
    if (to) {
      document.querySelectorAll('#ctseg button').forEach((b) => b.classList.remove('on'));
      to.classList.add('on');
      return;
    }

    const el = e.target.closest('[data-a]');
    if (!el) return;
    const a = el.dataset.a;

    // Il click dentro lo sheet non deve chiuderlo.
    if (a === 'sheet-close' && e.target.closest('[data-stop]') && !el.matches('[data-a="sheet-close"]')) return;

    handle(a, el, e);
  };
}

function handle(a, el, e) {
  const s = G.state;

  switch (a) {
    // ---------- navigazione ----------
    case 'home':
      G.role = null; G.state = null; G.screen = 'home';
      if (G.transport) { G.transport.destroy(); G.transport = null; }
      location.hash = '';
      render();
      break;

    case 'go-create':
      G.screen = 'create';
      app().innerHTML = screenCreate();
      bind();
      break;

    case 'tg-custom': {
      const box = $('ccustom');
      const seg = $('cbuyseg');
      const open = box.style.display === 'none';
      box.style.display = open ? 'block' : 'none';
      seg.style.display = open ? 'none' : 'grid';
      $('ccustombtn').textContent = open
        ? 'Torna ai tagli predefiniti'
        : 'Preferisco impostare io i valori';
      break;
    }

    case 'tg-rise': {
      const sw = $('crise');
      sw.classList.toggle('on');
      $('clevelwrap').style.display = sw.classList.contains('on') ? 'block' : 'none';
      break;
    }

    // ---------- creazione ----------
    case 'create': {
      const gm = ($('cgm').value || '').trim();
      if (!gm) { toast('Serve il tuo nome'); $('cgm').focus(); return; }
      saveName(gm);
      const rising = $('crise').classList.contains('on');
      const lvBtn = document.querySelector('#cseg button.on');
      const toBtn = document.querySelector('#ctseg button.on');
      // Taglio predefinito, oppure valori inseriti a mano.
      const usingCustom = $('ccustom').style.display !== 'none';
      let buyIn, chips, bb;
      if (usingCustom) {
        buyIn = Math.max(1, +$('cbuy').value || 10);
        chips = Math.max(100, +$('cchips').value || 1000);
        bb = Math.max(2, +$('cbb').value || 20);
      } else {
        const sel = document.querySelector('#cbuyseg button.on');
        const preset = BUYINS.find((b) => b.euro === (sel ? +sel.dataset.buy : 10)) || BUYINS[1];
        buyIn = preset.euro; chips = preset.chips; bb = preset.bb;
      }

      const cfg = {
        gmName: gm,
        tableName: ($('ctname').value || '').trim() || 'Tavolo',
        buyIn, chips, bb,
        rising,
        levelMin: lvBtn ? +lvBtn.dataset.lv : 20,
        timeout: toBtn ? +toBtn.dataset.to : 45,
      };
      if (!librariesReady()) {
        toast(humanError(new Error('NO_PEERJS')), 5200);
        return;
      }
      el.disabled = true;
      el.textContent = 'Apro il tavolo…';
      Host.create(cfg).catch((err) => {
        toast(humanError(err), 5200);
        el.disabled = false;
        el.textContent = 'Apri il tavolo';
      });
      break;
    }

    // ---------- ingresso ----------
    case 'join': {
      const code = ($('jcode').value || '').trim().toUpperCase();
      const name = ($('jname').value || '').trim();
      if (code.length !== 4) { toast('Il codice ha 4 caratteri'); $('jcode').focus(); return; }
      if (!name) { toast('Serve il tuo nome'); $('jname').focus(); return; }
      saveName(name);
      if (!librariesReady()) {
        toast(humanError(new Error('NO_PEERJS')), 5200);
        return;
      }
      Client.join(code, name).catch((err) => {
        toast(humanError(err), 5200);
        G.role = null; G.connState = 'idle';
        render();
      });
      break;
    }

    case 'resume': {
      const saved = loadSession();
      if (!librariesReady()) { toast(humanError(new Error('NO_PEERJS')), 5200); return; }
      if (saved) Host.resume(saved).catch((err) => toast(humanError(err), 5200));
      break;
    }

    case 'discard':
      clearSession();
      render();
      toast('Partita eliminata');
      break;

    // ---------- partita ----------
    case 'start':
      Host.startHand();
      break;

    case 'fold':
      if (confirmFoldNeeded()) { doAction('FOLD'); }
      break;

    case 'check': doAction('CHECK'); break;
    case 'call': doAction('CALL'); break;
    case 'allin': doAction('ALLIN'); break;

    case 'raise-open': {
      const legal = myLegal();
      const r = legal.find((x) => x.action === 'RAISE' || x.action === 'BET');
      if (!r) return;
      G.raiseValue = r.min;
      G.sheet = 'raise';
      render();
      break;
    }

    case 'raise-confirm': {
      const legal = myLegal();
      const r = legal.find((x) => x.action === 'RAISE' || x.action === 'BET');
      if (!r) return;
      const v = Math.max(r.min, Math.min(r.max, G.raiseValue || r.min));
      G.sheet = null;
      doAction(v >= r.max ? 'ALLIN' : r.action, v);
      break;
    }

    // ---------- assegnazione ----------
    case 'award-confirm': {
      const ok = Host.cmd({ t: CMD.DECLARE_WINNERS, awards: G.awards });
      if (ok) {
        G.awards = {};
        G.sheet = null;
        buzz(60);
        render();
      }
      break;
    }

    // ---------- sheet ----------
    case 'sheet-close': G.sheet = null; render(); break;
    case 'sheet-gm': G.sheet = 'gm'; render(); break;
    case 'sheet-history': G.sheet = 'history'; render(); break;
    case 'sheet-adjust': G.sheet = 'adjust'; render(); break;
    case 'sheet-restore': G.sheet = 'restore'; render(); break;

    case 'sheet-award': {
      // Vincitore unico: assegnazione immediata, senza far scegliere.
      const h = s.hand;
      if (h && h.autoWinner && h.pots.length === 1) {
        Host.cmd({ t: CMD.DECLARE_WINNERS, awards: { [h.pots[0].id]: [h.autoWinner] } });
        buzz(60);
        return;
      }
      G.awards = {};
      // Precompila i pot con un solo eleggibile.
      if (h) for (const p of h.pots) if (p.eligible.length === 1) G.awards[p.id] = [p.eligible[0]];
      G.sheet = 'award';
      render();
      break;
    }

    // ---------- comandi GM ----------
    case 'pause-game': Host.cmd({ t: CMD.PAUSE }); G.sheet = null; render(); break;
    case 'resume-game': Host.cmd({ t: CMD.RESUME }); G.sheet = null; render(); break;

    case 'undo':
      if (confirm('Annullare l\'ultima mano? Le fiches tornano com\'erano prima.')) {
        Host.undoLastHand();
      }
      break;

    case 'restore': {
      const idx = +el.dataset.idx;
      if (confirm('Tornare all\'inizio della mano ' + (getCheckpoints()[idx] || {}).n + '?')) {
        Host.restoreCheckpoint(idx);
      }
      break;
    }

    case 'adjust-confirm': {
      const seatId = $('adjseat').value;
      const delta = Math.round(+$('adjval').value || 0);
      const note = ($('adjnote').value || '').trim();
      if (!delta) { toast('Inserisci un valore'); return; }
      if (Host.cmd({ t: CMD.ADJUST, seatId, delta, note })) {
        G.sheet = null;
        render();
        toast('Correzione applicata');
      }
      break;
    }

    case 'force-fold': {
      const seatId = el.dataset.seat;
      const seat = s.seats.find((x) => x.id === seatId);
      if (confirm('Far lasciare la mano a ' + (seat ? seat.name : '') + '?')) {
        Host.cmd({
          t: CMD.PLAYER_ACTION, seatId,
          handId: s.hand.handId, seq: s.hand.actionSeq, action: 'FOLD',
        });
      }
      break;
    }

    case 'toggle-sound':
      G.soundOn = !G.soundOn;
      if (G.soundOn) ping();
      render();
      break;

    case 'share':
      shareLink('Entra nel tavolo ' + G.tableCode, joinUrl());
      break;

    case 'copy-link':
      navigator.clipboard && navigator.clipboard.writeText(joinUrl())
        .then(() => toast('Link copiato'))
        .catch(() => toast('Copialo a mano dal riquadro'));
      break;

    case 'share-results': {
      const rows = settlement(s);
      const txt = s.name + '\n' + rows.map((r, i) => `${i + 1}. ${r.name} ${euro(r.net)}`).join('\n');
      shareLink(txt, '');
      break;
    }

    case 'end':
      if (confirm('Chiudere la partita e vedere il resoconto?')) {
        Host.cmd({ t: CMD.END_SESSION });
        clearInterval(Host.levelTimer);
        clearTimeout(Host.timer);
        G.sheet = null;
        render();
      }
      break;

    case 'new-game':
      clearSession();
      G.role = null; G.state = null;
      if (G.transport) { G.transport.destroy(); G.transport = null; }
      location.hash = '';
      render();
      break;
  }
}

/** Chiede conferma solo quando lasciare è chiaramente uno spreco. */
function confirmFoldNeeded() {
  const legal = myLegal();
  const canCheck = legal.some((a) => a.action === 'CHECK');
  if (!canCheck) return true;
  return confirm('Puoi restare in gioco senza pagare. Lasciare comunque?');
}

// ------------------------------------------------------------
// Avvio
// ------------------------------------------------------------
window.addEventListener('DOMContentLoaded', () => {
  // Un link con #CODICE porta direttamente alla schermata d'ingresso.
  render();

  const code = (location.hash || '').replace('#', '').toUpperCase();
  if (code.length === 4 && savedName() && librariesReady()) {
    // Nome già noto: entra subito.
    Client.join(code, savedName()).catch((err) => {
      G.role = null; G.connState = 'idle'; render();
      toast(humanError(err), 5200);
    });
  }
});

// Avvisa prima di chiudere: se il GM chiude, la partita si ferma.
window.addEventListener('beforeunload', (e) => {
  if (G.role === 'host' && G.state && G.state.phase !== 'FINISHED' && G.state.handNumber > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});
