<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0B1F17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fiches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FICHES — design tokens
   Direzione: il feltro del tavolo, non il "dark mode" generico.
   Verde profondo, ottone caldo, tipografia che tiene a 50 cm.
   ============================================================ */
:root{
  --felt-900:#071612;
  --felt-800:#0B1F17;
  --felt-700:#102D22;
  --felt-600:#163B2C;
  --felt-500:#1E4E3A;
  --rail:#2A1A12;
  --brass:#E8B04B;
  --brass-dim:#A67C2E;
  --clay:#D8563F;
  --bone:#F2EDE3;
  --bone-dim:#A8A296;
  --ink:#05100C;

  --ok:#4BC98A;
  --warn:#E8B04B;
  --danger:#E4573D;

  --r-sm:8px; --r-md:14px; --r-lg:22px; --r-full:999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px;

  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;

  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
body{
  font-family:var(--body);
  background:var(--felt-900);
  color:var(--bone);
  font-size:16px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
/* Ogni cifra usa larghezza fissa: gli stack non "ballano" quando cambiano. */
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

button{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;cursor:pointer}
input{font-family:inherit;font-size:16px;color:inherit}
:focus-visible{outline:3px solid var(--brass);outline-offset:2px}

#app{height:100dvh;display:flex;flex-direction:column;position:relative}

/* ---------- superfici ---------- */
.screen{
  flex:1;display:flex;flex-direction:column;
  padding:calc(var(--safe-t) + 16px) 16px calc(var(--safe-b) + 16px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.card{
  background:linear-gradient(160deg,var(--felt-700),var(--felt-800));
  border:1px solid rgba(232,176,75,.13);
  border-radius:var(--r-lg);
  padding:20px;
}

/* ---------- tipografia ---------- */
h1,h2,h3{font-family:var(--display);margin:0;letter-spacing:-.02em;font-weight:800}
h1{font-size:34px;line-height:1.05}
h2{font-size:22px;line-height:1.15}
.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--brass-dim);
}
.muted{color:var(--bone-dim);font-size:14px}

/* ---------- marchio ---------- */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-mark{
  width:34px;height:34px;border-radius:var(--r-full);
  background:radial-gradient(circle at 30% 28%,var(--brass),var(--brass-dim) 62%,#6B4E1C);
  box-shadow:0 0 0 3px var(--felt-900),0 0 0 5px rgba(232,176,75,.30);
  position:relative;flex:none;
}
.brand-mark::after{
  content:'';position:absolute;inset:7px;border-radius:var(--r-full);
  border:2px dashed rgba(7,22,18,.5);
}
.brand-name{font-family:var(--display);font-size:21px;font-weight:800;letter-spacing:-.02em}

/* ---------- bottoni ---------- */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  min-height:56px;padding:0 20px;border-radius:var(--r-md);
  font-weight:700;font-size:17px;letter-spacing:-.01em;
  transition:transform .12s cubic-bezier(.2,.8,.3,1),filter .12s;
  border:1px solid transparent;width:100%;
}
.btn:active{transform:scale(.975)}
.btn:disabled{opacity:.32;pointer-events:none}
.btn-primary{background:linear-gradient(180deg,var(--brass),var(--brass-dim));color:var(--ink)}
.btn-ghost{background:rgba(242,237,227,.06);border-color:rgba(242,237,227,.16);color:var(--bone)}
.btn-danger{background:rgba(228,87,61,.14);border-color:rgba(228,87,61,.42);color:#FF9A85}
.btn-sm{min-height:44px;font-size:15px;padding:0 14px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--bone-dim);margin-bottom:7px}
.input{
  width:100%;min-height:54px;padding:0 16px;
  background:var(--felt-900);border:1px solid rgba(242,237,227,.16);
  border-radius:var(--r-md);color:var(--bone);font-weight:600;
}
.input:focus{border-color:var(--brass);outline:none}
.row{display:flex;gap:10px}
.row>*{flex:1}

/* ---------- toggle ---------- */
.toggle{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 16px;background:rgba(242,237,227,.045);
  border:1px solid rgba(242,237,227,.11);border-radius:var(--r-md);margin-bottom:12px;
}
.switch{width:52px;height:31px;border-radius:var(--r-full);background:rgba(242,237,227,.16);position:relative;transition:background .2s;flex:none}
.switch.on{background:var(--brass)}
.switch::after{
  content:'';position:absolute;top:3px;left:3px;width:25px;height:25px;
  border-radius:var(--r-full);background:var(--bone);
  transition:transform .2s cubic-bezier(.2,.8,.3,1);
}
.switch.on::after{transform:translateX(21px);background:var(--ink)}

/* ---------- segmented ---------- */
.seg{display:flex;background:var(--felt-900);border-radius:var(--r-md);padding:4px;gap:4px;border:1px solid rgba(242,237,227,.11)}
.seg button{flex:1;min-height:44px;border-radius:10px;font-weight:600;font-size:15px;color:var(--bone-dim)}
.seg button.on{background:var(--brass);color:var(--ink)}

/* ============================================================
   TAVOLO
   ============================================================ */
.table-wrap{flex:1;display:flex;flex-direction:column;min-height:0}

.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:calc(var(--safe-t) + 10px) 14px 10px;
}
.chip-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--r-full);
  background:rgba(232,176,75,.11);border:1px solid rgba(232,176,75,.28);
  font-size:12px;font-weight:700;color:var(--brass);letter-spacing:.02em;
}
.icon-btn{
  width:42px;height:42px;border-radius:var(--r-full);
  background:rgba(242,237,227,.07);border:1px solid rgba(242,237,227,.13);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;
}

/* --- il feltro --- */
.felt{
  flex:1;min-height:0;position:relative;margin:0 12px;
  border-radius:120px/90px;
  background:
    radial-gradient(ellipse at 50% 42%,var(--felt-500) 0%,var(--felt-700) 55%,var(--felt-800) 100%);
  border:9px solid var(--rail);
  box-shadow:
    inset 0 0 70px rgba(0,0,0,.55),
    inset 0 2px 0 rgba(255,255,255,.05),
    0 12px 32px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}

/* --- piatto al centro --- */
.pot-core{text-align:center;z-index:3;pointer-events:none;padding:0 12px}
.pot-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--brass-dim)}
.pot-value{
  font-family:var(--display);font-weight:800;
  font-size:clamp(40px,13vw,62px);line-height:1;
  color:var(--brass);
  text-shadow:0 3px 18px rgba(232,176,75,.32);
  font-variant-numeric:tabular-nums;
}
.pot-side{font-size:12px;color:var(--bone-dim);margin-top:5px;font-variant-numeric:tabular-nums}
.street-tag{
  display:inline-block;margin-top:9px;padding:4px 13px;border-radius:var(--r-full);
  background:rgba(7,22,18,.6);border:1px solid rgba(232,176,75,.26);
  font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--brass);
}

/* --- posti attorno al feltro --- */
.seat{
  position:absolute;width:82px;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;z-index:4;
  transition:opacity .25s;
}
.seat.folded{opacity:.3}
.seat.eliminated{opacity:.22}
.avatar{
  width:50px;height:50px;border-radius:var(--r-full);
  background:linear-gradient(155deg,var(--felt-500),var(--felt-700));
  border:2px solid rgba(242,237,227,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:19px;color:var(--bone);
  position:relative;
}
.avatar.me{border-color:var(--brass);box-shadow:0 0 0 2px rgba(232,176,75,.22)}
.avatar.allin{border-color:var(--clay);box-shadow:0 0 16px rgba(216,86,63,.5)}
.avatar.off{filter:grayscale(1) brightness(.6)}

/* ELEMENTO FIRMA: l'anello del turno.
   Deve essere impossibile da ignorare guardando il telefono per mezzo secondo. */
.avatar.acting{
  border-color:var(--brass);
  animation:turnPulse 1.5s ease-in-out infinite;
}
@keyframes turnPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(232,176,75,.65),0 0 22px rgba(232,176,75,.5)}
  50%{box-shadow:0 0 0 11px rgba(232,176,75,0),0 0 34px rgba(232,176,75,.75)}
}
/* Anello del timer: si svuota, senza numeri rossi lampeggianti. */
.timer-ring{position:absolute;inset:-6px;transform:rotate(-90deg);pointer-events:none}
.timer-ring circle{fill:none;stroke-width:3;stroke-linecap:round}
.timer-ring .bg{stroke:rgba(7,22,18,.55)}
.timer-ring .fg{stroke:var(--brass);transition:stroke-dashoffset .95s linear}
.timer-ring.low .fg{stroke:var(--clay)}

.seat-name{font-size:11px;font-weight:600;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seat-chips{font-size:14px;font-weight:800;color:var(--brass);font-variant-numeric:tabular-nums;line-height:1.1}
.seat-bet{
  position:absolute;bottom:-19px;
  padding:2px 8px;border-radius:var(--r-full);
  background:var(--ink);border:1px solid rgba(232,176,75,.42);
  font-size:11px;font-weight:800;color:var(--brass);font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.pos-badge{
  position:absolute;top:-4px;right:-4px;
  width:21px;height:21px;border-radius:var(--r-full);
  background:var(--bone);color:var(--ink);
  font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--felt-800);
}
.pos-badge.sb{background:var(--brass-dim);color:var(--ink)}
.pos-badge.bb{background:var(--clay);color:#fff}
.tag-mini{
  font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
  padding:1px 6px;border-radius:var(--r-full);
}
.tag-allin{background:var(--clay);color:#fff}
.tag-out{background:rgba(242,237,227,.15);color:var(--bone-dim)}
.tag-off{background:rgba(228,87,61,.2);color:#FF9A85}

/* ---------- barra azioni ---------- */
.actionbar{
  padding:12px 12px calc(var(--safe-b) + 12px);
  background:linear-gradient(180deg,transparent,var(--felt-900) 22%);
}
.my-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 15px;margin-bottom:10px;
  background:rgba(7,22,18,.72);border:1px solid rgba(232,176,75,.22);
  border-radius:var(--r-md);
}
.my-strip .lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim)}
.my-strip .val{font-family:var(--display);font-size:26px;font-weight:800;color:var(--brass);font-variant-numeric:tabular-nums;line-height:1}

.acts{display:flex;gap:9px}
.acts .btn{flex:1;font-size:16px;min-height:60px;flex-direction:column;gap:1px}
.acts .btn small{font-size:12px;font-weight:600;opacity:.75;font-variant-numeric:tabular-nums}
.btn-fold{background:rgba(228,87,61,.15);border-color:rgba(228,87,61,.4);color:#FF9A85}
.btn-call{background:rgba(242,237,227,.09);border-color:rgba(242,237,227,.22);color:var(--bone)}
.btn-raise{background:linear-gradient(180deg,var(--brass),var(--brass-dim));color:var(--ink)}

.waiting-note{
  text-align:center;padding:19px;color:var(--bone-dim);font-size:14px;font-weight:500;
}

/* ---------- raise sheet ---------- */
.sheet-back{
  position:fixed;inset:0;background:rgba(4,10,8,.76);
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  z-index:50;display:flex;align-items:flex-end;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-height:88dvh;overflow-y:auto;
  background:var(--felt-800);
  border-top:1px solid rgba(232,176,75,.26);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:20px 16px calc(var(--safe-b) + 20px);
  animation:slideUp .26s cubic-bezier(.2,.9,.3,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grip{width:38px;height:4px;border-radius:2px;background:rgba(242,237,227,.25);margin:0 auto 16px}

.raise-amount{
  font-family:var(--display);font-size:52px;font-weight:800;text-align:center;
  color:var(--brass);font-variant-numeric:tabular-nums;line-height:1;margin:6px 0 4px;
}
.raise-sub{text-align:center;font-size:13px;color:var(--bone-dim);margin-bottom:18px}
input[type=range]{
  width:100%;height:44px;-webkit-appearance:none;background:transparent;margin:0 0 14px;
}
input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:rgba(242,237,227,.16)}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:34px;height:34px;border-radius:50%;
  background:var(--brass);border:3px solid var(--felt-800);margin-top:-13px;
  box-shadow:0 2px 10px rgba(0,0,0,.5);
}
input[type=range]::-moz-range-track{height:8px;border-radius:4px;background:rgba(242,237,227,.16)}
input[type=range]::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:var(--brass);border:3px solid var(--felt-800)}
.presets{display:flex;gap:8px;margin-bottom:16px}
.presets button{
  flex:1;min-height:46px;border-radius:var(--r-md);
  background:rgba(242,237,227,.07);border:1px solid rgba(242,237,227,.17);
  font-size:13px;font-weight:700;color:var(--bone);
}
.presets button.on{background:var(--brass);color:var(--ink);border-color:var(--brass)}

/* ---------- pot award ---------- */
.pot-award{
  background:rgba(7,22,18,.6);border:1px solid rgba(232,176,75,.24);
  border-radius:var(--r-md);padding:15px;margin-bottom:13px;
}
.pot-award-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.pot-award-amt{font-family:var(--display);font-size:29px;font-weight:800;color:var(--brass);font-variant-numeric:tabular-nums}
.winner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.winner-chip{
  padding:13px 8px;border-radius:var(--r-md);
  background:rgba(242,237,227,.055);border:2px solid rgba(242,237,227,.14);
  text-align:center;font-weight:700;font-size:14px;transition:all .14s;
}
.winner-chip.on{background:rgba(232,176,75,.19);border-color:var(--brass);color:var(--brass)}
.winner-chip .sub{display:block;font-size:11px;font-weight:600;opacity:.65;margin-top:2px;font-variant-numeric:tabular-nums}

/* ---------- overlay ---------- */
.overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(4,10,8,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  display:flex;align-items:center;justify-content:center;padding:26px;
  animation:fadeIn .2s ease;
}
.overlay-inner{text-align:center;max-width:340px;width:100%}
.spinner{
  width:46px;height:46px;margin:0 auto 20px;
  border:3px solid rgba(232,176,75,.2);border-top-color:var(--brass);
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- lista giocatori ---------- */
.plist{display:flex;flex-direction:column;gap:9px;margin:16px 0}
.prow{
  display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:rgba(242,237,227,.05);border:1px solid rgba(242,237,227,.1);
  border-radius:var(--r-md);
}
.pdot{width:9px;height:9px;border-radius:50%;background:var(--ok);flex:none}
.pdot.off{background:var(--danger)}
.prow .nm{flex:1;font-weight:600;font-size:15px}
.prow .ch{font-weight:800;color:var(--brass);font-variant-numeric:tabular-nums}

/* ---------- codice tavolo ---------- */
.code-display{
  text-align:center;padding:22px;margin:18px 0;
  background:var(--felt-900);border:1px dashed rgba(232,176,75,.4);border-radius:var(--r-lg);
}
.code-value{
  font-family:var(--mono);font-size:47px;font-weight:700;letter-spacing:.13em;
  color:var(--brass);line-height:1;
}
#qrbox{display:flex;justify-content:center;margin:16px 0}
#qrbox canvas,#qrbox img{border-radius:12px;border:7px solid var(--bone);display:block}

/* ---------- risultati ---------- */
.res-row{
  display:flex;align-items:center;gap:13px;padding:15px;
  border-bottom:1px solid rgba(242,237,227,.08);
}
.res-rank{
  width:29px;height:29px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;background:rgba(242,237,227,.09);
}
.res-rank.first{background:var(--brass);color:var(--ink)}
.res-net{font-family:var(--display);font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
.res-net.pos{color:var(--ok)}
.res-net.neg{color:var(--danger)}

/* ---------- toast ---------- */
#toast{
  position:fixed;left:50%;bottom:calc(var(--safe-b) + 96px);
  transform:translateX(-50%) translateY(14px);
  background:var(--rail);border:1px solid rgba(232,176,75,.4);
  color:var(--bone);padding:12px 20px;border-radius:var(--r-full);
  font-size:14px;font-weight:600;z-index:100;
  opacity:0;pointer-events:none;transition:all .24s cubic-bezier(.2,.8,.3,1);
  max-width:88vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- avviso ---------- */
.notice{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px 16px;margin-bottom:18px;
  background:rgba(228,87,61,.12);border:1px solid rgba(228,87,61,.4);
  border-radius:var(--r-md);font-size:13.5px;line-height:1.4;
}
.notice-ico{
  width:24px;height:24px;border-radius:50%;flex:none;
  background:var(--danger);color:#fff;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;
}
.joinlink{
  margin-top:12px;padding:9px 11px;
  background:rgba(7,22,18,.7);border:1px solid rgba(242,237,227,.13);
  border-radius:var(--r-sm);
  font-family:var(--mono);font-size:11.5px;color:var(--bone-dim);
  word-break:break-all;line-height:1.35;
}
.joinlink:active{border-color:var(--brass);color:var(--brass)}

/* ---------- tagli d'ingresso ---------- */
.buyins{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.buyins button{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-height:86px;padding:10px 4px;border-radius:var(--r-md);
  background:rgba(242,237,227,.05);border:2px solid rgba(242,237,227,.13);
  transition:all .14s;
}
.buyins button.on{background:rgba(232,176,75,.15);border-color:var(--brass)}
.bi-eur{font-family:var(--display);font-size:25px;font-weight:800;line-height:1;color:var(--bone)}
.buyins button.on .bi-eur{color:var(--brass)}
.bi-sub{font-size:10.5px;font-weight:600;color:var(--bone-dim);line-height:1.3;font-variant-numeric:tabular-nums}
.linklike{
  display:block;width:100%;margin-top:11px;padding:6px;
  font-size:13px;font-weight:600;color:var(--brass-dim);
  text-decoration:underline;text-underline-offset:3px;
}
.pot-euro{
  font-size:12px;font-weight:700;color:var(--bone-dim);
  margin-top:3px;font-variant-numeric:tabular-nums;
}

<body>
<div id="app"></div>
<div id="toast"></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
'use strict';

// ===== src/engine/types.js =====
// ============================================================
// POKER CHIP TRACKER — ENGINE TYPES
// Pure data structures. No I/O, no DOM, no network.
// ============================================================

/**
 * @typedef {'LOBBY'|'HAND'|'AWAITING_PAYOUT'|'STANDBY'|'FINISHED'} Phase
 * @typedef {'PREFLOP'|'FLOP'|'TURN'|'RIVER'} Street
 */

const PHASE = {
  LOBBY: 'LOBBY',
  HAND: 'HAND',
  AWAITING_PAYOUT: 'AWAITING_PAYOUT',
  STANDBY: 'STANDBY',
  FINISHED: 'FINISHED',
};

const STREET = {
  PREFLOP: 'PREFLOP',
  FLOP: 'FLOP',
  TURN: 'TURN',
  RIVER: 'RIVER',
};

const STREET_ORDER = [
  STREET.PREFLOP,
  STREET.FLOP,
  STREET.TURN,
  STREET.RIVER,
];

const ACTION = {
  FOLD: 'FOLD',
  CHECK: 'CHECK',
  CALL: 'CALL',
  BET: 'BET',
  RAISE: 'RAISE',
  ALLIN: 'ALLIN',
};

const REJECT = {
  STALE_SEQ: 'STALE_SEQ',
  NOT_YOUR_TURN: 'NOT_YOUR_TURN',
  ILLEGAL_ACTION: 'ILLEGAL_ACTION',
  INVALID_AMOUNT: 'INVALID_AMOUNT',
  WRONG_PHASE: 'WRONG_PHASE',
  UNKNOWN_SEAT: 'UNKNOWN_SEAT',
};

const MAX_SEATS = 8;

/**
 * Crea uno stato tavolo iniziale.
 */
function createTable({
  tableId,
  name = 'Tavolo',
  buyInEuro = 20,
  startingChips = 1000,
  blindLevels = null,
  levelDurationMin = 20,
  actionTimeoutSec = 45,
  gmSeatId = null,
}) {
  return {
    version: 0,
    tableId,
    name,
    config: {
      buyInEuro,
      startingChips,
      // se blindLevels è null → blind fisse al livello 1
      blindLevels: blindLevels || defaultBlindStructure(startingChips),
      risingBlinds: blindLevels !== null,
      levelDurationMin,
      actionTimeoutSec,
    },
    gmSeatId,
    seats: [],
    phase: PHASE.LOBBY,
    standbyReason: null,
    hand: null,
    currentLevel: 0,
    pendingLevelUp: false,
    handNumber: 0,
    buttonSeatId: null,
    history: [], // HandRecord[] — compatto
    adjustments: [], // log trasparente delle rettifiche GM
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}

/**
 * Struttura blind di default, derivata dallo stack iniziale.
 * Progressione ~1.5x. BB iniziale = 1% dello stack.
 */
function defaultBlindStructure(startingChips) {
  const baseBB = Math.max(10, Math.round((startingChips * 0.01) / 5) * 5);
  const levels = [];
  let bb = baseBB;
  for (let i = 0; i < 12; i++) {
    levels.push({
      level: i + 1,
      sb: Math.round(bb / 2),
      bb: bb,
    });
    bb = Math.round((bb * 1.5) / 5) * 5;
  }
  return levels;
}

function createSeat({ id, name, seatIndex, chips }) {
  return {
    id,
    name,
    seatIndex,
    chips,
    connected: true,
    eliminated: false,
    finishPosition: null,
    lastSeen: Date.now(),
  };
}


// ===== src/engine/pots.js =====
// ============================================================
// POT CALCULATION — main pot + side pots
// Questo è l'algoritmo a più alto rischio dell'intero sistema.
// Invariante: sum(pots) === sum(contributions), SEMPRE.
// ============================================================

/**
 * Calcola main pot e side pot dai contributi totali della mano.
 *
 * Regola: chi ha foldato ha comunque messo fiches nel piatto (le paga),
 * ma non è eleggibile a vincerlo.
 *
 * @param {Record<string, number>} contributions - seatId → fiches totali messe nella mano
 * @param {Set<string>|string[]} folded - seatId che hanno foldato
 * @returns {Array<{id:string, amount:number, eligible:string[]}>}
 */
function computePots(contributions, folded) {
  const foldedSet = folded instanceof Set ? folded : new Set(folded);

  // Livelli distinti di contribuzione, in ordine crescente.
  const levels = [
    ...new Set(Object.values(contributions).filter((v) => v > 0)),
  ].sort((a, b) => a - b);

  const pots = [];
  let prev = 0;

  for (const level of levels) {
    const slice = level - prev;
    // Chi ha contribuito ALMENO fino a questo livello partecipa a questa fetta.
    const contributors = Object.keys(contributions).filter(
      (s) => contributions[s] >= level
    );
    const amount = slice * contributors.length;

    if (amount > 0) {
      pots.push({
        id: `pot-${pots.length}`,
        amount,
        // Solo i non-foldati possono vincerla.
        eligible: contributors.filter((s) => !foldedSet.has(s)),
      });
    }
    prev = level;
  }

  // CASO LIMITE: un pot senza eleggibili.
  // Succede quando chi ha contribuito di più folda (es. bet grosso, tutti
  // foldano, poi folda anche lui). Quelle fiches non spariscono: vanno
  // riversate sul pot inferiore più vicino che ha almeno un eleggibile.
  for (let i = pots.length - 1; i >= 0; i--) {
    if (pots[i].eligible.length === 0) {
      const orphan = pots.splice(i, 1)[0];
      let target = -1;
      for (let j = i - 1; j >= 0; j--) {
        if (pots[j].eligible.length > 0) { target = j; break; }
      }
      if (target >= 0) {
        pots[target].amount += orphan.amount;
      } else if (pots.length > 0) {
        pots[0].amount += orphan.amount;
      } else {
        // Nessun eleggibile da nessuna parte (tutti foldati: impossibile
        // in una mano reale, ma non deve comunque perdere fiches).
        pots.push({ ...orphan, eligible: Object.keys(contributions) });
      }
    }
  }

  return mergeAdjacent(pots);
}

/**
 * Fonde pot adiacenti con identica lista di eleggibili.
 * Evita di mostrare al GM 4 pot separati quando in realtà è uno solo.
 */
function mergeAdjacent(pots) {
  if (pots.length <= 1) return reindex(pots);

  const merged = [];
  for (const pot of pots) {
    const last = merged[merged.length - 1];
    if (last && sameEligible(last.eligible, pot.eligible)) {
      last.amount += pot.amount;
    } else {
      merged.push({ ...pot, eligible: [...pot.eligible] });
    }
  }
  return reindex(merged);
}

function reindex(pots) {
  return pots.map((p, i) => ({
    ...p,
    id: i === 0 ? 'main' : `side-${i}`,
    label: i === 0 ? 'Piatto principale' : `Side pot ${i}`,
  }));
}

function sameEligible(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort();
  const sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}

/**
 * Distribuisce un pot fra i vincitori dichiarati dal GM.
 * Lo split con resto assegna le fiches extra al primo seat
 * a sinistra del button (regola standard del poker).
 *
 * @returns {Record<string, number>} seatId → fiches vinte
 */
function splitPot(potAmount, winnerSeatIds, seatOrder, buttonSeatId) {
  if (winnerSeatIds.length === 0) {
    throw new Error('splitPot: nessun vincitore dichiarato');
  }
  if (winnerSeatIds.length === 1) {
    return { [winnerSeatIds[0]]: potAmount };
  }

  const base = Math.floor(potAmount / winnerSeatIds.length);
  let remainder = potAmount - base * winnerSeatIds.length;

  const result = {};
  for (const id of winnerSeatIds) result[id] = base;

  // Ordina i vincitori partendo da sinistra del button.
  const ordered = orderFromButton(winnerSeatIds, seatOrder, buttonSeatId);
  let i = 0;
  while (remainder > 0) {
    result[ordered[i % ordered.length]] += 1;
    remainder -= 1;
    i += 1;
  }

  return result;
}

/**
 * Ordina un sottoinsieme di seat partendo dal primo a sinistra del button.
 */
function orderFromButton(subset, seatOrder, buttonSeatId) {
  const btnIdx = seatOrder.indexOf(buttonSeatId);
  const start = btnIdx === -1 ? 0 : btnIdx + 1;
  const rotated = [];
  for (let i = 0; i < seatOrder.length; i++) {
    rotated.push(seatOrder[(start + i) % seatOrder.length]);
  }
  return rotated.filter((s) => subset.includes(s));
}

/**
 * Totale sul tavolo in questo momento (per la UI).
 */
function totalPot(contributions) {
  return Object.values(contributions).reduce((a, b) => a + b, 0);
}


// ===== src/engine/betting.js =====
// ============================================================
// BETTING RULES — No-Limit Texas Hold'em
// Funzioni pure. Nessuna mutazione dello stato.
// ============================================================


/**
 * Quanto deve mettere questo seat per pareggiare la puntata corrente.
 */
function callAmount(hand, seatId, chips) {
  const already = hand.streetContributions[seatId] || 0;
  const toCall = hand.currentBet - already;
  return Math.min(Math.max(0, toCall), chips);
}

/**
 * Il minimo "raise to" legale per questo seat.
 * In NLHE: currentBet + minRaiseIncrement.
 */
function minRaiseTo(hand) {
  return hand.currentBet + hand.minRaiseIncrement;
}

/**
 * Il massimo "raise to": tutto lo stack del seat più quanto già messo.
 */
function maxRaiseTo(hand, seatId, chips) {
  const already = hand.streetContributions[seatId] || 0;
  return already + chips;
}

/**
 * Elenco delle azioni legali per un seat.
 * Usato sia dalla validazione server-side sia dalla UI per abilitare i bottoni.
 *
 * @returns {{action:string, min?:number, max?:number, amount?:number}[]}
 */
function legalActions(hand, seat) {
  if (!seat || seat.chips <= 0) return [];
  if (hand.folded.includes(seat.id)) return [];
  if (hand.allIn.includes(seat.id)) return [];
  if (hand.actingSeatId !== seat.id) return [];

  const already = hand.streetContributions[seat.id] || 0;
  const toCall = hand.currentBet - already;
  const out = [];

  // FOLD è sempre disponibile quando c'è qualcosa da pareggiare.
  // (Foldare potendo checkare è legale ma stupido: lo permettiamo comunque,
  //  la UI lo nasconde.)
  out.push({ action: ACTION.FOLD });

  if (toCall <= 0) {
    out.push({ action: ACTION.CHECK });
  } else {
    const amt = Math.min(toCall, seat.chips);
    out.push({ action: ACTION.CALL, amount: amt, allIn: amt === seat.chips });
  }

  // BET / RAISE
  const canReopen = canSeatRaise(hand, seat.id);
  const maxTo = already + seat.chips;

  if (canReopen && seat.chips > toCall) {
    const minTo = Math.min(minRaiseTo(hand), maxTo);
    if (hand.currentBet === 0) {
      out.push({ action: ACTION.BET, min: minTo, max: maxTo });
    } else {
      out.push({ action: ACTION.RAISE, min: minTo, max: maxTo });
    }
  }

  // ALL-IN è sempre possibile se hai fiches.
  if (seat.chips > 0) {
    out.push({ action: ACTION.ALLIN, amount: maxTo });
  }

  return out;
}

/**
 * REGOLA SOTTILE E CRITICA.
 *
 * Un all-in inferiore al min-raise NON riapre l'azione per chi ha già agito.
 * Esempio: bet 100, Tizio all-in a 130 (raise incompleto di 30 < 100).
 * Chi ha già chiamato i 100 può solo call/fold, NON può ri-raisare.
 *
 * Implementato via `lastFullRaiseTo`: il seat può raisare solo se
 * la puntata corrente è cresciuta di un raise COMPLETO dalla sua ultima azione.
 */
function canSeatRaise(hand, seatId) {
  // `actedSinceFullRaise` elenca chi ha già parlato DOPO l'ultimo raise
  // completo. Chi è in quella lista ha già avuto la sua occasione di
  // raisare contro la puntata corrente: un all-in incompleto sopraggiunto
  // dopo non gliela restituisce.
  const list = hand.actedSinceFullRaise || [];
  return !list.includes(seatId);
}

/**
 * Valida un'azione in arrivo e ne restituisce la forma normalizzata.
 *
 * @returns {{ok:true, action:string, amount:number, allIn:boolean} | {ok:false, code:string, message:string}}
 */
function validateAction(hand, seat, action, amount) {
  const legal = legalActions(hand, seat);
  const match = legal.find((l) => l.action === action);

  if (!match) {
    return {
      ok: false,
      code: 'ILLEGAL_ACTION',
      message: `Azione ${action} non disponibile ora`,
    };
  }

  const already = hand.streetContributions[seat.id] || 0;

  switch (action) {
    case ACTION.FOLD:
      return { ok: true, action, amount: 0, allIn: false };

    case ACTION.CHECK:
      return { ok: true, action, amount: 0, allIn: false };

    case ACTION.CALL: {
      const amt = match.amount;
      return { ok: true, action, amount: amt, allIn: amt === seat.chips };
    }

    case ACTION.ALLIN: {
      return { ok: true, action, amount: seat.chips, allIn: true };
    }

    case ACTION.BET:
    case ACTION.RAISE: {
      const raiseTo = Math.round(amount);
      if (!Number.isFinite(raiseTo)) {
        return { ok: false, code: 'INVALID_AMOUNT', message: 'Importo non valido' };
      }
      if (raiseTo < match.min) {
        return {
          ok: false,
          code: 'INVALID_AMOUNT',
          message: `Il minimo è ${match.min}`,
        };
      }
      if (raiseTo > match.max) {
        return {
          ok: false,
          code: 'INVALID_AMOUNT',
          message: `Il massimo è ${match.max}`,
        };
      }
      const delta = raiseTo - already;
      return {
        ok: true,
        action,
        amount: delta,
        raiseTo,
        allIn: delta === seat.chips,
      };
    }

    default:
      return { ok: false, code: 'ILLEGAL_ACTION', message: 'Azione sconosciuta' };
  }
}

/**
 * Il round di puntata è chiuso?
 *
 * Chiuso quando ogni seat ancora in gioco (non folded, non all-in):
 *   - ha agito almeno una volta in questa street, E
 *   - ha pareggiato la puntata corrente
 *
 * Caso speciale: se resta un solo seat non-folded, la mano finisce.
 */
function isBettingRoundClosed(hand, seats) {
  const active = seats.filter(
    (s) =>
      !hand.folded.includes(s.id) &&
      !hand.allIn.includes(s.id) &&
      hand.inHand.includes(s.id)
  );

  // Nessuno può più agire (tutti all-in o foldati) → round chiuso.
  if (active.length === 0) return true;

  // Un solo giocatore rimasto in mano → mano finita.
  const stillIn = hand.inHand.filter((id) => !hand.folded.includes(id));
  if (stillIn.length <= 1) return true;

  for (const s of active) {
    if (!hand.actedThisStreet.includes(s.id)) return false;
    const contributed = hand.streetContributions[s.id] || 0;
    if (contributed < hand.currentBet) return false;
  }
  return true;
}

/**
 * Preset per il controllo raise nella UI: ½ pot, pot, all-in.
 */
function raisePresets(hand, seat, potSize) {
  const already = hand.streetContributions[seat.id] || 0;
  const toCall = Math.max(0, hand.currentBet - already);
  const maxTo = already + seat.chips;
  const min = Math.min(minRaiseTo(hand), maxTo);

  // Pot-sized raise = call + (pot + call)
  const potAfterCall = potSize + toCall;
  const potRaiseTo = hand.currentBet + potAfterCall;
  const halfPotRaiseTo = hand.currentBet + Math.round(potAfterCall / 2);

  const clamp = (v) => Math.max(min, Math.min(maxTo, Math.round(v)));

  return [
    { label: '½ piatto', value: clamp(halfPotRaiseTo) },
    { label: 'Piatto', value: clamp(potRaiseTo) },
    { label: 'All-in', value: maxTo },
  ].filter((p, i, arr) => arr.findIndex((x) => x.value === p.value) === i);
}


// ===== src/engine/reducer.js =====
// ============================================================
// REDUCER — macchina a stati pura e deterministica.
// (State, Command) => State
// Nessuna mutazione dell'input. Nessun I/O. Nessun Date.now()
// se non passato esplicitamente (per rendere i test riproducibili).
// ============================================================




const clone = (o) => JSON.parse(JSON.stringify(o));

// ------------------------------------------------------------
// Comandi
// ------------------------------------------------------------
const CMD = {
  JOIN: 'JOIN',
  LEAVE: 'LEAVE',
  RECONNECT: 'RECONNECT',
  SET_CONNECTED: 'SET_CONNECTED',
  START_HAND: 'START_HAND',
  PLAYER_ACTION: 'PLAYER_ACTION',
  DECLARE_WINNERS: 'DECLARE_WINNERS',
  ADJUST: 'ADJUST',
  KICK: 'KICK',
  PAUSE: 'PAUSE',
  RESUME: 'RESUME',
  LEVEL_UP: 'LEVEL_UP',
  END_SESSION: 'END_SESSION',
};

/**
 * Applica un comando allo stato.
 * @returns {{state: object, error: null} | {state: object, error: {code:string,message:string}}}
 */
function reduce(state, cmd, now = Date.now()) {
  const s = clone(state);

  try {
    const next = apply(s, cmd, now);
    next.version = state.version + 1;
    next.updatedAt = now;
    return { state: next, error: null };
  } catch (e) {
    if (e && e.__reject) {
      return { state, error: { code: e.code, message: e.message } };
    }
    throw e;
  }
}

function reject(code, message) {
  const e = new Error(message);
  e.__reject = true;
  e.code = code;
  throw e;
}

// ------------------------------------------------------------

function apply(s, cmd, now) {
  switch (cmd.t) {
    case CMD.JOIN:
      return cmdJoin(s, cmd, now);
    case CMD.RECONNECT:
      return cmdReconnect(s, cmd, now);
    case CMD.SET_CONNECTED:
      return cmdSetConnected(s, cmd, now);
    case CMD.LEAVE:
    case CMD.KICK:
      return cmdRemove(s, cmd, now);
    case CMD.START_HAND:
      return cmdStartHand(s, cmd, now);
    case CMD.PLAYER_ACTION:
      return cmdPlayerAction(s, cmd, now);
    case CMD.DECLARE_WINNERS:
      return cmdDeclareWinners(s, cmd, now);
    case CMD.ADJUST:
      return cmdAdjust(s, cmd, now);
    case CMD.PAUSE:
      return cmdPause(s, cmd, now);
    case CMD.RESUME:
      return cmdResume(s, cmd, now);
    case CMD.LEVEL_UP:
      return cmdLevelUp(s, cmd, now);
    case CMD.END_SESSION:
      return { ...s, phase: PHASE.FINISHED };
    default:
      reject('UNKNOWN_CMD', `Comando sconosciuto: ${cmd.t}`);
  }
}

// ------------------------------------------------------------
// Lobby / seats
// ------------------------------------------------------------

function cmdJoin(s, cmd, now) {
  if (s.phase !== PHASE.LOBBY && s.handNumber > 0) {
    // Si può entrare solo prima dell'inizio (no rebuy, no late entry).
    reject('WRONG_PHASE', 'La partita è già iniziata');
  }
  if (s.seats.length >= MAX_SEATS) {
    reject('TABLE_FULL', 'Il tavolo è pieno (8 giocatori)');
  }
  if (s.seats.some((x) => x.id === cmd.seatId)) {
    return cmdReconnect(s, cmd, now);
  }
  const name = String(cmd.name || '').trim().slice(0, 16) || 'Giocatore';
  if (s.seats.some((x) => x.name.toLowerCase() === name.toLowerCase())) {
    reject('NAME_TAKEN', 'Nome già in uso al tavolo');
  }

  const seat = createSeat({
    id: cmd.seatId,
    name,
    seatIndex: nextFreeIndex(s.seats),
    chips: s.config.startingChips,
  });
  seat.lastSeen = now;
  s.seats.push(seat);
  s.seats.sort((a, b) => a.seatIndex - b.seatIndex);
  return s;
}

function nextFreeIndex(seats) {
  const used = new Set(seats.map((x) => x.seatIndex));
  for (let i = 0; i < MAX_SEATS; i++) if (!used.has(i)) return i;
  return seats.length;
}

function cmdReconnect(s, cmd, now) {
  const seat = s.seats.find((x) => x.id === cmd.seatId);
  if (!seat) reject('UNKNOWN_SEAT', 'Posto non trovato');
  seat.connected = true;
  seat.lastSeen = now;
  return maybeResume(s, now);
}

function cmdSetConnected(s, cmd, now) {
  const seat = s.seats.find((x) => x.id === cmd.seatId);
  if (!seat) return s;
  seat.connected = cmd.connected;
  if (cmd.connected) {
    seat.lastSeen = now;
    return maybeResume(s, now);
  }
  return maybeStandby(s, now);
}

function cmdRemove(s, cmd, now) {
  const idx = s.seats.findIndex((x) => x.id === cmd.seatId);
  if (idx === -1) return s;

  if (s.phase === PHASE.HAND && s.hand && s.hand.inHand.includes(cmd.seatId)) {
    // Rimozione a mano in corso → fold forzato, poi rimozione.
    s = forceFold(s, cmd.seatId, now);
  }
  s.seats.splice(idx, 1);
  return maybeResume(s, now);
}

// ------------------------------------------------------------
// Standby (disconnessioni)
// ------------------------------------------------------------

/**
 * Va in standby solo se il disconnesso è rilevante per la mano corrente:
 * cioè è ancora in gioco e non è già all-in o foldato.
 */
function maybeStandby(s, now) {
  if (s.phase !== PHASE.HAND || !s.hand) return s;

  const blocking = s.seats.filter(
    (x) =>
      !x.connected &&
      s.hand.inHand.includes(x.id) &&
      !s.hand.folded.includes(x.id) &&
      !s.hand.allIn.includes(x.id)
  );

  if (blocking.length > 0) {
    s.phase = PHASE.STANDBY;
    s.standbyReason = 'DISCONNECT';
    // Congela il timer: salva il tempo residuo, non la deadline assoluta.
    if (s.hand.deadline) {
      s.hand.frozenRemainingMs = Math.max(0, s.hand.deadline - now);
      s.hand.deadline = null;
    }
  }
  return s;
}

function maybeResume(s, now) {
  if (s.phase !== PHASE.STANDBY) return s;
  if (s.standbyReason === 'GM_PAUSE') return s; // solo il GM può togliere la pausa

  const stillBlocking = s.seats.some(
    (x) =>
      !x.connected &&
      s.hand &&
      s.hand.inHand.includes(x.id) &&
      !s.hand.folded.includes(x.id) &&
      !s.hand.allIn.includes(x.id)
  );

  if (!stillBlocking) {
    s.phase = PHASE.HAND;
    s.standbyReason = null;
    if (s.hand && s.hand.frozenRemainingMs != null) {
      s.hand.deadline = now + s.hand.frozenRemainingMs;
      s.hand.frozenRemainingMs = null;
    }
  }
  return s;
}

function cmdPause(s, cmd, now) {
  if (s.phase === PHASE.FINISHED) return s;
  s.phase = PHASE.STANDBY;
  s.standbyReason = 'GM_PAUSE';
  if (s.hand && s.hand.deadline) {
    s.hand.frozenRemainingMs = Math.max(0, s.hand.deadline - now);
    s.hand.deadline = null;
  }
  return s;
}

function cmdResume(s, cmd, now) {
  if (s.phase !== PHASE.STANDBY) return s;
  s.standbyReason = null;
  s.phase = s.hand ? PHASE.HAND : PHASE.LOBBY;
  if (s.hand && s.hand.frozenRemainingMs != null) {
    s.hand.deadline = now + s.hand.frozenRemainingMs;
    s.hand.frozenRemainingMs = null;
  }
  // Se qualcuno è ancora disconnesso, torna subito in standby.
  return maybeStandby(s, now);
}

// ------------------------------------------------------------
// Inizio mano
// ------------------------------------------------------------

function cmdStartHand(s, cmd, now) {
  if (s.phase !== PHASE.LOBBY) {
    reject('WRONG_PHASE', 'Non è il momento di iniziare una mano');
  }

  const alive = s.seats.filter((x) => x.chips > 0 && !x.eliminated);
  if (alive.length < 2) {
    reject('NOT_ENOUGH_PLAYERS', 'Servono almeno 2 giocatori con fiches');
  }

  // Applica l'aumento di livello in sospeso: MAI a mano in corso.
  if (s.pendingLevelUp) {
    s.currentLevel = Math.min(s.currentLevel + 1, s.config.blindLevels.length - 1);
    s.pendingLevelUp = false;
  }

  const order = alive.map((x) => x.id);
  s.buttonSeatId = nextButton(s, order);

  const level = s.config.blindLevels[s.currentLevel];
  const sbId = pickBlindSeat(order, s.buttonSeatId, alive.length === 2 ? 0 : 1);
  const bbId = pickBlindSeat(order, s.buttonSeatId, alive.length === 2 ? 1 : 2);

  s.handNumber += 1;
  s.hand = {
    handId: `h${s.handNumber}`,
    street: STREET.PREFLOP,
    buttonSeatId: s.buttonSeatId,
    sbSeatId: sbId,
    bbSeatId: bbId,
    inHand: order,
    actingSeatId: null,
    currentBet: 0,
    minRaiseIncrement: level.bb,
    lastFullRaiseTo: 0,
    contributions: Object.fromEntries(order.map((id) => [id, 0])),
    streetContributions: Object.fromEntries(order.map((id) => [id, 0])),
    folded: [],
    allIn: [],
    actedThisStreet: [],
    actedSinceFullRaise: [],
    pots: [],
    actionSeq: 0,
    deadline: null,
    frozenRemainingMs: null,
    level: s.currentLevel,
    log: [],
  };

  // Posta i bui. Se lo stack è inferiore al buio → all-in forzato.
  postBlind(s, sbId, level.sb);
  postBlind(s, bbId, level.bb);

  s.hand.currentBet = Math.max(
    s.hand.streetContributions[sbId] || 0,
    s.hand.streetContributions[bbId] || 0
  );
  s.hand.lastFullRaiseTo = level.bb;
  s.hand.minRaiseIncrement = level.bb;
  s.hand.actedSinceFullRaise = [];

  // Preflop parla il primo dopo il BB. In heads-up il BB è l'altro
  // giocatore, quindi "dopo il BB" coincide con il button: la stessa
  // formula funziona per entrambi i casi.
  s.hand.actingSeatId = nextToAct(s, bbId);
  s.phase = PHASE.HAND;
  s.hand.deadline = deadlineFor(s, now);

  return maybeStandby(s, now);
}

function nextButton(s, order) {
  if (!s.buttonSeatId || !order.includes(s.buttonSeatId)) {
    return order[0];
  }
  const i = order.indexOf(s.buttonSeatId);
  return order[(i + 1) % order.length];
}

function pickBlindSeat(order, buttonId, offset) {
  const i = order.indexOf(buttonId);
  return order[(i + offset) % order.length];
}

function postBlind(s, seatId, amount) {
  const seat = s.seats.find((x) => x.id === seatId);
  const pay = Math.min(amount, seat.chips);
  seat.chips -= pay;
  s.hand.contributions[seatId] += pay;
  s.hand.streetContributions[seatId] += pay;
  if (seat.chips === 0) s.hand.allIn.push(seatId);
  s.hand.log.push({ seatId, action: 'BLIND', amount: pay });
}

function deadlineFor(s, now) {
  const t = s.config.actionTimeoutSec;
  return t > 0 ? now + t * 1000 : null;
}

// ------------------------------------------------------------
// Azione del giocatore
// ------------------------------------------------------------

function cmdPlayerAction(s, cmd, now) {
  if (s.phase !== PHASE.HAND) {
    reject('WRONG_PHASE', 'La partita non è in corso');
  }
  const h = s.hand;
  if (!h) reject('WRONG_PHASE', 'Nessuna mano in corso');

  if (cmd.handId !== h.handId) {
    reject('STALE_SEQ', 'Mano non più valida, sincronizzo');
  }
  if (typeof cmd.seq === 'number' && cmd.seq !== h.actionSeq) {
    reject('STALE_SEQ', 'Azione non più valida, sincronizzo');
  }
  if (h.actingSeatId !== cmd.seatId) {
    reject('NOT_YOUR_TURN', 'Non è il tuo turno');
  }

  const seat = s.seats.find((x) => x.id === cmd.seatId);
  if (!seat) reject('UNKNOWN_SEAT', 'Posto non trovato');

  const v = validateAction(h, seat, cmd.action, cmd.amount);
  if (!v.ok) reject(v.code, v.message);

  applyValidatedAction(s, seat, v);

  h.actionSeq += 1;
  if (!h.actedThisStreet.includes(seat.id)) h.actedThisStreet.push(seat.id);
  if (!h.actedSinceFullRaise.includes(seat.id)) h.actedSinceFullRaise.push(seat.id);

  return advance(s, now);
}

function applyValidatedAction(s, seat, v) {
  const h = s.hand;

  if (v.action === ACTION.FOLD) {
    h.folded.push(seat.id);
    h.log.push({ seatId: seat.id, action: 'FOLD', amount: 0 });
    return;
  }

  if (v.action === ACTION.CHECK) {
    h.log.push({ seatId: seat.id, action: 'CHECK', amount: 0 });
    return;
  }

  // CALL / BET / RAISE / ALLIN — tutti muovono fiches.
  const pay = Math.min(v.amount, seat.chips);
  seat.chips -= pay;
  h.contributions[seat.id] += pay;
  h.streetContributions[seat.id] += pay;

  const newTotal = h.streetContributions[seat.id];

  if (newTotal > h.currentBet) {
    const increment = newTotal - h.currentBet;
    // Un raise è "completo" se l'incremento raggiunge il min-raise.
    // Altrimenti è un all-in incompleto: NON riapre l'azione.
    if (increment >= h.minRaiseIncrement) {
      h.lastFullRaiseTo = newTotal;
      h.minRaiseIncrement = increment;
      // Un raise completo riapre l'azione: tutti devono riparlare
      // e riacquistano il diritto di ri-raisare.
      h.actedThisStreet = [];
      h.actedSinceFullRaise = [];
    }
    h.currentBet = newTotal;
  }

  if (seat.chips === 0 && !h.allIn.includes(seat.id)) {
    h.allIn.push(seat.id);
  }

  h.log.push({ seatId: seat.id, action: v.action, amount: pay, to: newTotal });
}

/**
 * Fa avanzare la mano: prossimo giocatore, prossima street, o payout.
 */
function advance(s, now) {
  const h = s.hand;

  const stillIn = h.inHand.filter((id) => !h.folded.includes(id));

  // Tutti hanno foldato tranne uno → vince senza showdown.
  if (stillIn.length === 1) {
    return toPayout(s, now, stillIn);
  }

  if (isBettingRoundClosed(h, s.seats)) {
    // Se tutti quelli rimasti sono all-in, salta direttamente al payout:
    // le carte vanno girate e non c'è più azione.
    const canStillAct = stillIn.filter((id) => !h.allIn.includes(id));
    if (canStillAct.length <= 1) {
      return toPayout(s, now, stillIn);
    }

    const idx = STREET_ORDER.indexOf(h.street);
    if (idx === STREET_ORDER.length - 1) {
      return toPayout(s, now, stillIn);
    }

    // Prossima street.
    h.street = STREET_ORDER[idx + 1];
    h.currentBet = 0;
    h.minRaiseIncrement = s.config.blindLevels[h.level].bb;
    h.lastFullRaiseTo = 0;
    h.actedThisStreet = [];
    h.actedSinceFullRaise = [];
    for (const id of h.inHand) h.streetContributions[id] = 0;

    // Postflop parla per primo il primo attivo a sinistra del button.
    h.actingSeatId = nextToAct(s, h.buttonSeatId);
    h.deadline = deadlineFor(s, now);
    return s;
  }

  h.actingSeatId = nextToAct(s, h.actingSeatId);
  h.deadline = deadlineFor(s, now);
  return s;
}

/**
 * Prossimo seat che deve agire, partendo dal successivo a `fromId`.
 * Salta foldati, all-in e chi non è in mano.
 */
function nextToAct(s, fromId) {
  const h = s.hand;
  const order = h.inHand;
  const start = order.indexOf(fromId);

  for (let i = 1; i <= order.length; i++) {
    const id = order[(start + i) % order.length];
    if (h.folded.includes(id)) continue;
    if (h.allIn.includes(id)) continue;
    const seat = s.seats.find((x) => x.id === id);
    if (!seat || seat.chips <= 0) continue;
    return id;
  }
  return null;
}

function forceFold(s, seatId, now) {
  const h = s.hand;
  if (!h || !h.inHand.includes(seatId)) return s;
  if (h.folded.includes(seatId)) return s;
  h.folded.push(seatId);
  h.log.push({ seatId, action: 'FOLD', amount: 0, forced: true });
  if (h.actingSeatId === seatId) {
    h.actionSeq += 1;
    return advance(s, now);
  }
  return s;
}

/** Fold automatico per timeout — invocato dal GM host, non dal client. */
function timeoutFold(state, now = Date.now()) {
  const s = clone(state);
  if (s.phase !== PHASE.HAND || !s.hand || !s.hand.actingSeatId) {
    return { state, error: null };
  }
  const seatId = s.hand.actingSeatId;
  const seat = s.seats.find((x) => x.id === seatId);
  // Se può checkare gratis, checka invece di foldare: è sempre meglio.
  const toCall = s.hand.currentBet - (s.hand.streetContributions[seatId] || 0);
  const cmd =
    toCall <= 0
      ? { t: CMD.PLAYER_ACTION, seatId, handId: s.hand.handId, seq: s.hand.actionSeq, action: ACTION.CHECK }
      : { t: CMD.PLAYER_ACTION, seatId, handId: s.hand.handId, seq: s.hand.actionSeq, action: ACTION.FOLD };
  return reduce(state, cmd, now);
}

// ------------------------------------------------------------
// Payout
// ------------------------------------------------------------

function toPayout(s, now, stillIn) {
  const h = s.hand;
  h.pots = computePots(h.contributions, h.folded);
  h.actingSeatId = null;
  h.deadline = null;
  s.phase = PHASE.AWAITING_PAYOUT;

  // Se è rimasto un solo giocatore, non serve il GM: assegnazione automatica.
  if (stillIn.length === 1) {
    h.autoWinner = stillIn[0];
  }
  return s;
}

function cmdDeclareWinners(s, cmd, now) {
  if (s.phase !== PHASE.AWAITING_PAYOUT) {
    reject('WRONG_PHASE', 'Non c\'è nessun piatto da assegnare');
  }
  const h = s.hand;

  // cmd.awards: { potId: string[] } — più seatId = split
  const awards = cmd.awards || {};
  const seatOrder = h.inHand;

  const winnings = {};
  for (const pot of h.pots) {
    const winners = awards[pot.id];
    if (!winners || winners.length === 0) {
      reject('INCOMPLETE_PAYOUT', `Manca il vincitore di ${pot.label}`);
    }
    for (const w of winners) {
      if (!pot.eligible.includes(w)) {
        reject('INVALID_WINNER', 'Giocatore non eleggibile per questo piatto');
      }
    }
    const split = splitPot(pot.amount, winners, seatOrder, h.buttonSeatId);
    for (const [id, amt] of Object.entries(split)) {
      winnings[id] = (winnings[id] || 0) + amt;
    }
  }

  for (const [id, amt] of Object.entries(winnings)) {
    const seat = s.seats.find((x) => x.id === id);
    if (seat) seat.chips += amt;
  }

  // Storico compatto: ~60 byte per mano.
  s.history.push({
    n: s.handNumber,
    w: Object.keys(winnings).map(
      (id) => (s.seats.find((x) => x.id === id) || {}).name || '?'
    ),
    p: h.pots.reduce((a, b) => a + b.amount, 0),
    l: h.level,
  });
  if (s.history.length > 200) s.history.shift();

  // Eliminazioni (niente rebuy).
  const alive = s.seats.filter((x) => x.chips > 0);
  for (const seat of s.seats) {
    if (seat.chips <= 0 && !seat.eliminated) {
      seat.eliminated = true;
      seat.finishPosition = alive.length + countEliminatedAfter(s);
    }
  }

  s.hand = null;
  s.phase = alive.length <= 1 ? PHASE.FINISHED : PHASE.LOBBY;
  return s;
}

function countEliminatedAfter(s) {
  return s.seats.filter((x) => x.eliminated && x.finishPosition != null).length;
}

// ------------------------------------------------------------
// Rettifica manuale del GM — sempre loggata e visibile a tutti
// ------------------------------------------------------------

function cmdAdjust(s, cmd, now) {
  const seat = s.seats.find((x) => x.id === cmd.seatId);
  if (!seat) reject('UNKNOWN_SEAT', 'Posto non trovato');
  const delta = Math.round(cmd.delta);
  if (!Number.isFinite(delta) || delta === 0) {
    reject('INVALID_AMOUNT', 'Importo non valido');
  }
  if (seat.chips + delta < 0) {
    reject('INVALID_AMOUNT', 'Le fiches non possono andare sotto zero');
  }
  seat.chips += delta;
  if (seat.chips > 0) {
    seat.eliminated = false;
    seat.finishPosition = null;
  }
  s.adjustments.push({
    seatId: cmd.seatId,
    name: seat.name,
    delta,
    note: String(cmd.note || '').slice(0, 60),
    at: now,
    hand: s.handNumber,
  });
  return s;
}

function cmdLevelUp(s, cmd, now) {
  if (!s.config.risingBlinds) return s;
  if (s.currentLevel >= s.config.blindLevels.length - 1) return s;
  // Mai a mano in corso: viene applicato all'inizio della prossima.
  if (s.phase === PHASE.HAND || s.phase === PHASE.AWAITING_PAYOUT) {
    s.pendingLevelUp = true;
  } else {
    s.currentLevel += 1;
  }
  return s;
}

// ------------------------------------------------------------
// Derivazioni per la UI (pure)
// ------------------------------------------------------------

function currentPotTotal(state) {
  if (!state.hand) return 0;
  return Object.values(state.hand.contributions).reduce((a, b) => a + b, 0);
}

function blindsOf(state) {
  return state.config.blindLevels[state.currentLevel];
}

/**
 * Risultato finale in euro. Invariante: la somma dei netti è zero.
 */
function settlement(state) {
  const { buyInEuro, startingChips } = state.config;
  const rows = state.seats.map((s) => {
    const euro = (s.chips / startingChips) * buyInEuro;
    return {
      name: s.name,
      chips: s.chips,
      gross: euro,
      net: euro - buyInEuro,
    };
  });

  // Arrotonda a 0,50 € e fa assorbire il resto al maggior vincitore,
  // così la somma torna esattamente a zero.
  const rounded = rows.map((r) => ({
    ...r,
    net: Math.round(r.net * 2) / 2,
  }));
  const drift = rounded.reduce((a, b) => a + b.net, 0);
  if (Math.abs(drift) > 0.001 && rounded.length > 0) {
    const top = rounded.reduce((a, b) => (b.net > a.net ? b : a), rounded[0]);
    top.net = Math.round((top.net - drift) * 100) / 100;
  }
  return rounded.sort((a, b) => b.net - a.net);
}


// ===== src/transport.js =====
// ============================================================
// TRANSPORT — WebRTC via PeerJS
// Il device del GM fa da server. Gli altri si connettono a lui.
// Su Wi-Fi condiviso la connessione è diretta: il signaling serve
// solo per lo scambio iniziale degli indirizzi.
// ============================================================

const PEER_OPTS = {
  debug: 0,
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' },
    ],
  },
};

/** ID PeerJS deterministico dal codice tavolo, così il link basta a trovare l'host. */
function hostPeerId(tableCode) {
  return `pkr-${tableCode.toLowerCase()}`;
}

/** Codice tavolo leggibile: 4 caratteri, niente caratteri ambigui. */
function makeTableCode() {
  const alpha = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no I,O,0,1
  let out = '';
  for (let i = 0; i < 4; i++) {
    out += alpha[Math.floor(Math.random() * alpha.length)];
  }
  return out;
}

// ------------------------------------------------------------
// HOST — accetta connessioni, fa da autorità
// ------------------------------------------------------------
class HostTransport {
  constructor(tableCode) {
    this.tableCode = tableCode;
    this.peer = null;
    this.conns = new Map(); // peerId → DataConnection
    this.seatByConn = new Map(); // peerId → seatId
    this.handlers = { message: [], join: [], leave: [], ready: [], error: [] };
  }

  on(evt, cb) { this.handlers[evt].push(cb); return this; }
  emit(evt, ...args) { for (const cb of this.handlers[evt]) cb(...args); }

  async start() {
    return new Promise((resolve, reject) => {
      const id = hostPeerId(this.tableCode);
      this.peer = new window.Peer(id, PEER_OPTS);

      const timeout = setTimeout(() => {
        reject(new Error('Timeout di connessione al servizio'));
      }, 15000);

      this.peer.on('open', () => {
        clearTimeout(timeout);
        this.emit('ready', id);
        resolve(id);
      });

      this.peer.on('connection', (conn) => this._wire(conn));

      this.peer.on('error', (err) => {
        clearTimeout(timeout);
        // 'unavailable-id' = un altro tavolo usa già questo codice.
        if (err.type === 'unavailable-id') {
          reject(new Error('Codice tavolo già in uso, riprova'));
        } else if (err.type === 'peer-unavailable') {
          // Un client se n'è andato: non è un errore fatale.
        } else {
          this.emit('error', err);
        }
      });

      this.peer.on('disconnected', () => {
        // Riconnessione al signaling: non tocca i DataChannel già aperti.
        try { this.peer.reconnect(); } catch (_) {}
      });
    });
  }

  _wire(conn) {
    conn.on('open', () => {
      this.conns.set(conn.peer, conn);
    });

    conn.on('data', (msg) => {
      if (!msg || typeof msg !== 'object') return;
      if (msg.t === 'HELLO') {
        this.seatByConn.set(conn.peer, msg.seatId);
      }
      this.emit('message', conn.peer, msg);
    });

    conn.on('close', () => {
      const seatId = this.seatByConn.get(conn.peer);
      this.conns.delete(conn.peer);
      this.seatByConn.delete(conn.peer);
      if (seatId) this.emit('leave', seatId);
    });

    conn.on('error', () => {
      const seatId = this.seatByConn.get(conn.peer);
      this.conns.delete(conn.peer);
      this.seatByConn.delete(conn.peer);
      if (seatId) this.emit('leave', seatId);
    });
  }

  send(peerId, msg) {
    const c = this.conns.get(peerId);
    if (c && c.open) {
      try { c.send(msg); } catch (_) {}
    }
  }

  sendToSeat(seatId, msg) {
    for (const [peerId, sid] of this.seatByConn) {
      if (sid === seatId) this.send(peerId, msg);
    }
  }

  broadcast(msg) {
    for (const [, conn] of this.conns) {
      if (conn.open) {
        try { conn.send(msg); } catch (_) {}
      }
    }
  }

  destroy() {
    try { this.peer && this.peer.destroy(); } catch (_) {}
    this.conns.clear();
    this.seatByConn.clear();
  }
}

// ------------------------------------------------------------
// CLIENT — si connette all'host, riconnessione automatica
// ------------------------------------------------------------
class ClientTransport {
  constructor(tableCode, seatId, name) {
    this.tableCode = tableCode;
    this.seatId = seatId;
    this.name = name;
    this.peer = null;
    this.conn = null;
    this.handlers = { message: [], open: [], close: [], error: [] };
    this.retries = 0;
    this.closed = false;
    this.retryTimer = null;
  }

  on(evt, cb) { this.handlers[evt].push(cb); return this; }
  emit(evt, ...args) { for (const cb of this.handlers[evt]) cb(...args); }

  async start() {
    this.closed = false;
    return this._connect();
  }

  _connect() {
    return new Promise((resolve, reject) => {
      if (this.peer) { try { this.peer.destroy(); } catch (_) {} }
      this.peer = new window.Peer(PEER_OPTS);

      let settled = false;
      const fail = (e) => {
        if (settled) return;
        settled = true;
        reject(e);
      };

      const timeout = setTimeout(() => fail(new Error('Nessuna risposta dal tavolo')), 20000);

      this.peer.on('open', () => {
        const conn = this.peer.connect(hostPeerId(this.tableCode), {
          reliable: true,
          serialization: 'json',
        });
        this.conn = conn;

        conn.on('open', () => {
          clearTimeout(timeout);
          this.retries = 0;
          conn.send({ t: 'HELLO', seatId: this.seatId, name: this.name });
          this.emit('open');
          if (!settled) { settled = true; resolve(); }
        });

        conn.on('data', (msg) => this.emit('message', msg));

        conn.on('close', () => {
          this.emit('close');
          this._scheduleRetry();
        });

        conn.on('error', () => {
          this._scheduleRetry();
        });
      });

      this.peer.on('error', (err) => {
        clearTimeout(timeout);
        if (err.type === 'peer-unavailable') {
          fail(new Error('Tavolo non trovato. Il Game Master ha l\'app aperta?'));
          this._scheduleRetry();
        } else {
          this.emit('error', err);
          fail(err);
        }
      });
    });
  }

  _scheduleRetry() {
    if (this.closed) return;
    if (this.retryTimer) return;
    // Backoff esponenziale con jitter, cap a 8s.
    const delay = Math.min(8000, 600 * Math.pow(1.6, this.retries)) + Math.random() * 400;
    this.retries += 1;
    this.retryTimer = setTimeout(() => {
      this.retryTimer = null;
      this._connect().catch(() => this._scheduleRetry());
    }, delay);
  }

  send(msg) {
    if (this.conn && this.conn.open) {
      try { this.conn.send(msg); return true; } catch (_) {}
    }
    return false;
  }

  get connected() {
    return !!(this.conn && this.conn.open);
  }

  destroy() {
    this.closed = true;
    if (this.retryTimer) clearTimeout(this.retryTimer);
    try { this.conn && this.conn.close(); } catch (_) {}
    try { this.peer && this.peer.destroy(); } catch (_) {}
  }
}

const fmt = (n) => new Intl.NumberFormat('it-IT').format(Math.round(n || 0));

function toast(msg, ms = 2200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}

function buzz(pattern) {
  try { navigator.vibrate && navigator.vibrate(pattern); } catch (_) {}
}

// Suono breve del proprio turno. WebAudio: nessun file da caricare.
let audioCtx = null;
function ping() {
  if (!G.soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    [880, 1320].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.11);
      g.gain.linearRampToValueAtTime(0.16, t + i * 0.11 + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.11 + 0.2);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + i * 0.11); o.stop(t + i * 0.11 + 0.22);
    });
  } catch (_) {}
}

// ------------------------------------------------------------
// Identità persistente: sopravvive alla chiusura del browser
// ------------------------------------------------------------
function myId() {
  let id = localStorage.getItem('fiches.seatId');
  if (!id) {
    id = 's' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    localStorage.setItem('fiches.seatId', id);
  }
  return id;
}
function savedName() { return localStorage.getItem('fiches.name') || ''; }
function saveName(n) { localStorage.setItem('fiches.name', n); }

// ------------------------------------------------------------
// Persistenza della partita (solo lato GM)
// ------------------------------------------------------------
const SAVE_KEY = 'fiches.session';
const CKPT_KEY = 'fiches.checkpoints';

function saveSession(state) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ state, at: Date.now() }));
  } catch (_) {}
}
function loadSession() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    // Oltre le 12 ore la sessione è considerata chiusa.
    if (Date.now() - o.at > 12 * 3600 * 1000) return null;
    if (!o.state || o.state.phase === 'FINISHED') return null;
    return o;
  } catch (_) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(SAVE_KEY); localStorage.removeItem(CKPT_KEY); } catch (_) {}
}

/** Checkpoint = stato pulito a inizio mano. Sono i punti di ripristino. */
function pushCheckpoint(state) {
  try {
    const list = JSON.parse(localStorage.getItem(CKPT_KEY) || '[]');
    list.push({ n: state.handNumber, at: Date.now(), state });
    while (list.length > 12) list.shift();
    localStorage.setItem(CKPT_KEY, JSON.stringify(list));
  } catch (_) {}
}
function getCheckpoints() {
  try { return JSON.parse(localStorage.getItem(CKPT_KEY) || '[]'); } catch (_) { return []; }
}

// ------------------------------------------------------------
// Wake lock: lo schermo non si spegne durante il proprio turno
// ------------------------------------------------------------
async function acquireWake() {
  try {
    if ('wakeLock' in navigator && !G.wakeLock) {
      G.wakeLock = await navigator.wakeLock.request('screen');
      G.wakeLock.addEventListener('release', () => { G.wakeLock = null; });
    }
  } catch (_) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') acquireWake();
});

// ============================================================
// HOST — il device del GM è l'autorità
// ============================================================
const Host = {
  timer: null,
  levelTimer: null,
  levelStartedAt: 0,

  async create(cfg) {
    const code = makeTableCode();
    G.tableCode = code;
    G.role = 'host';
    G.seatId = myId();
    G.name = cfg.gmName;

    let st = createTable({
      tableId: code,
      name: cfg.tableName,
      buyInEuro: cfg.buyIn,
      startingChips: cfg.chips,
      blindLevels: cfg.rising ? null : [{ level: 1, sb: Math.round(cfg.bb / 2), bb: cfg.bb }],
      levelDurationMin: cfg.levelMin,
      actionTimeoutSec: cfg.timeout,
      gmSeatId: G.seatId,
    });
    if (cfg.rising) {
      st.config.risingBlinds = true;
    }
    const r = reduce(st, { t: CMD.JOIN, seatId: G.seatId, name: cfg.gmName });
    st = r.state;
    G.state = st;

    await this.startTransport();
    this.commit();
  },

  async resume(saved) {
    G.state = saved.state;
    G.tableCode = saved.state.tableId;
    G.role = 'host';
    G.seatId = G.state.gmSeatId || myId();
    G.name = (G.state.seats.find((x) => x.id === G.seatId) || {}).name || 'GM';
    // Tutti risultano disconnessi finché non si ricollegano.
    G.state.seats.forEach((s) => { if (s.id !== G.seatId) s.connected = false; });
    await this.startTransport();
    this.commit();
  },

  async startTransport() {
    const t = new HostTransport(G.tableCode);
    G.transport = t;

    t.on('message', (peerId, msg) => this.onMessage(peerId, msg));
    t.on('leave', (seatId) => {
      const r = reduce(G.state, { t: CMD.SET_CONNECTED, seatId, connected: false });
      if (!r.error) { G.state = r.state; this.commit(); }
    });
    t.on('error', () => toast('Problema di connessione'));

    await t.start();
  },

  onMessage(peerId, msg) {
    if (msg.t === 'HELLO') {
      const exists = G.state.seats.some((x) => x.id === msg.seatId);
      const cmd = exists
        ? { t: CMD.RECONNECT, seatId: msg.seatId }
        : { t: CMD.JOIN, seatId: msg.seatId, name: msg.name };
      const r = reduce(G.state, cmd);
      if (r.error) {
        G.transport.send(peerId, { t: 'REJECT', code: r.error.code, message: r.error.message });
        return;
      }
      G.state = r.state;
      if (!exists) {
        toast((msg.name || 'Un giocatore') + ' si è unito');
        buzz(40);
      }
      this.commit();
      return;
    }

    if (msg.t === 'ACTION') {
      const r = reduce(G.state, {
        t: CMD.PLAYER_ACTION,
        seatId: msg.seatId,
        handId: msg.handId,
        seq: msg.seq,
        action: msg.action,
        amount: msg.amount,
      });
      if (r.error) {
        G.transport.send(peerId, { t: 'REJECT', code: r.error.code, message: r.error.message });
        G.transport.send(peerId, { t: 'STATE', state: G.state });
        return;
      }
      G.state = r.state;
      this.commit();
      return;
    }

    if (msg.t === 'SYNC') {
      G.transport.send(peerId, { t: 'STATE', state: G.state });
    }
  },

  /** Applica un comando locale del GM. */
  cmd(command, silent) {
    const r = reduce(G.state, command);
    if (r.error) {
      if (!silent) toast(r.error.message);
      return false;
    }
    G.state = r.state;
    this.commit();
    return true;
  },

  /** Persiste, trasmette, ridisegna, riarma i timer. */
  commit() {
    saveSession(G.state);
    if (G.transport) G.transport.broadcast({ t: 'STATE', state: G.state });
    this.armTimer();
    render();
  },

  armTimer() {
    clearTimeout(this.timer);
    const s = G.state;
    if (!s || s.phase !== 'HAND' || !s.hand || !s.hand.deadline) return;
    const wait = s.hand.deadline - Date.now();
    this.timer = setTimeout(() => {
      const r = timeoutFold(G.state);
      if (!r.error) { G.state = r.state; this.commit(); }
    }, Math.max(300, wait));
  },

  startLevelTimer() {
    clearInterval(this.levelTimer);
    const s = G.state;
    if (!s.config.risingBlinds || !s.config.levelDurationMin) return;
    this.levelStartedAt = Date.now();
    this.levelTimer = setInterval(() => {
      if (G.state.phase === 'STANDBY') { this.levelStartedAt += 1000; return; }
      const elapsed = Date.now() - this.levelStartedAt;
      if (elapsed >= G.state.config.levelDurationMin * 60000) {
        this.levelStartedAt = Date.now();
        this.cmd({ t: CMD.LEVEL_UP }, true);
        toast('Bui aumentati');
        buzz([60, 40, 60]);
      }
    }, 1000);
  },

  startHand() {
    pushCheckpoint(G.state);
    if (this.cmd({ t: CMD.START_HAND })) {
      if (!this.levelTimer) this.startLevelTimer();
    }
  },

  /** Torna al checkpoint precedente: annulla l'ultima mano. */
  undoLastHand() {
    const list = getCheckpoints();
    if (list.length === 0) { toast('Nessuna mano da annullare'); return; }
    const last = list.pop();
    localStorage.setItem(CKPT_KEY, JSON.stringify(list));
    G.state = last.state;
    G.state.version += 1;
    G.sheet = null;
    this.commit();
    toast('Mano ' + last.n + ' annullata');
  },

  restoreCheckpoint(idx) {
    const list = getCheckpoints();
    if (!list[idx]) return;
    G.state = list[idx].state;
    G.state.version += 1;
    localStorage.setItem(CKPT_KEY, JSON.stringify(list.slice(0, idx)));
    G.sheet = null;
    this.commit();
    toast('Ripristinata la mano ' + list[idx].n);
  },
};

// ============================================================
// CLIENT — replica lo stato, invia intent
// ============================================================
const Client = {
  async join(code, name) {
    G.role = 'client';
    G.seatId = myId();
    G.name = name;
    G.tableCode = code.toUpperCase();
    G.connState = 'connecting';
    render();

    const t = new ClientTransport(G.tableCode, G.seatId, name);
    G.transport = t;

    t.on('message', (msg) => {
      if (msg.t === 'STATE') {
        const prev = G.state;
        G.state = msg.state;
        G.connState = 'ok';
        G.pendingAction = false;
        notifyTurn(prev, G.state);
        render();
      } else if (msg.t === 'REJECT') {
        G.pendingAction = false;
        toast(msg.message || 'Azione rifiutata');
        render();
      }
    });
    t.on('open', () => { G.connState = 'ok'; render(); });
    t.on('close', () => { G.connState = 'lost'; render(); });

    await t.start();
  },

  act(action, amount) {
    if (!G.state || !G.state.hand) return;
    G.pendingAction = true;
    render();
    const sent = G.transport.send({
      t: 'ACTION',
      seatId: G.seatId,
      handId: G.state.hand.handId,
      seq: G.state.hand.actionSeq,
      action, amount,
    });
    if (!sent) {
      G.pendingAction = false;
      toast('Connessione assente, riprovo');
      render();
    }
  },
};

/** Azione unificata: il GM applica in locale, i client inviano. */
function doAction(action, amount) {
  if (G.role === 'host') {
    const s = G.state;
    const r = reduce(s, {
      t: CMD.PLAYER_ACTION,
      seatId: G.seatId,
      handId: s.hand.handId,
      seq: s.hand.actionSeq,
      action, amount,
    });
    if (r.error) { toast(r.error.message); return; }
    G.state = r.state;
    Host.commit();
  } else {
    Client.act(action, amount);
  }
}

/** Avviso quando arriva il proprio turno: colore + vibrazione + suono. */
function notifyTurn(prev, next) {
  const acting = next && next.hand ? next.hand.actingSeatId : null;
  if (acting === G.seatId && G.lastActing !== G.seatId && next.phase === 'HAND') {
    buzz([90, 55, 90]);
    ping();
    acquireWake();
  }
  G.lastActing = acting;
}

// ============================================================
// Derivazioni per la UI
// ============================================================
function me() {
  if (!G.state) return null;
  return G.state.seats.find((x) => x.id === G.seatId) || null;
}
function isGM() { return G.role === 'host'; }
function isMyTurn() {
  const s = G.state;
  return !!(s && s.phase === 'HAND' && s.hand && s.hand.actingSeatId === G.seatId);
}
function myLegal() {
  const s = G.state, m = me();
  if (!s || !s.hand || !m) return [];
  return legalActions(s.hand, m);
}
function joinUrl() {
  const base = location.origin + location.pathname;
  return base + '#' + G.tableCode;
}

];

/** Il piatto in euro: sapere quanto vale davvero quello che c'è sul tavolo. */
function potInEuro(chips) {
  const c = G.state.config;
  const v = (chips / c.startingChips) * c.buyInEuro;
  if (v < 0.05) return '';
  // Sotto i 10 € un decimale conta (0,50 € non è 1 €); sopra è rumore.
  // Arrotonda a 5 centesimi, poi toglie i decimali inutili.
  const r = Math.round(v * 20) / 20;
  const txt = (r % 1 === 0) ? String(r) : r.toFixed(2).replace(/0$/, '');
  return '≈ €' + txt.replace('.', ',');
}

const STREET_IT = {
  PREFLOP: 'Pre-flop', FLOP: 'Flop', TURN: 'Turn', RIVER: 'River',
};

function render() {
  const s = G.state;
  let html = '';

  if (!G.role) html = screenHome();
  else if (G.role === 'client' && !s) html = screenConnecting();
  else if (s && s.phase === 'FINISHED') html = screenResults();
  else if (s && s.phase === 'LOBBY' && s.handNumber === 0) html = screenLobby();
  else html = screenTable();

  html += renderSheets();
  html += renderOverlay();

  app().innerHTML = html;
  bind();
  if (G.screen === 'lobby' || (s && s.phase === 'LOBBY' && s.handNumber === 0)) drawQR();
  startTicker();
}
